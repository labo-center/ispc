<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Mon Coaching Santé</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
<style>
:root{
  /* Brand palette — identique questionnaire_contexte */
  --c-teal:#0ea5c9;    --c-teal-d:#0e7490; --c-teal-glow:rgba(14,165,201,.18);
  --c-violet:#7c3aed;  --c-violet-d:#6d28d9;
  --c-green:#10b981;   --c-green-d:#047857;
  --c-amber:#f59e0b;   --c-amber-d:#d97706;
  --c-red:#ef4444;     --c-red-d:#dc2626;
  /* Dark surface */
  --dark-1:#0a0f1e;  --dark-2:#0f1628;  --dark-3:#141c35;
  --dark-4:#1a2347;  --dark-5:#1e2a52;
  --dark-border:rgba(255,255,255,.09);
  --dark-mut:rgba(255,255,255,.45);
  /* Module identity */
  --meta:#7c3aed;    --meta-d:#6d28d9; --meta-l:#f5f3ff; --meta-m:#ddd6fe;
  --life:#0ea5c9;    --life-d:#0e7490; --life-l:#ecfeff; --life-m:#cffafe;
  --nutr:#10b981;    --nutr-d:#047857; --nutr-l:#ecfdf5; --nutr-m:#d1fae5;
  /* Light surface */
  --bg:#f4f3ef;  --card:#ffffff;  --txt:#111827;  --mut:#64748b;  --brd:#e5e0d8;
  --good:#059669;  --warn:#d97706;  --bad:#dc2626;
  --ff:'DM Sans',system-ui,sans-serif;
  --ffd:'Fraunces',Georgia,serif;
  --radius-card:20px;
  --radius-input:11px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:var(--ff);color:var(--txt);min-height:100vh;overflow-x:hidden}
button,input{font-family:var(--ff);border:none;cursor:pointer;outline:none}
/* App — pleine largeur pour que le hero se déploie sur toute la fenêtre */
.app{width:100%;padding:0 0 110px}
.content-wrap{max-width:700px;margin:0 auto;padding:0 16px}
.fade{animation:fi .38s cubic-bezier(.16,1,.3,1)}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}


/* ══ HERO PREMIUM (dark full-bleed) ══ */
.hero{
  background:var(--dark-2);
  padding:44px 24px 40px;
  position:relative;overflow:hidden;margin-bottom:0;
}
.hero::before{content:'';position:absolute;top:-100px;left:-80px;width:440px;height:440px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.25) 0%,transparent 65%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-80px;right:-60px;width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(14,165,201,.2) 0%,transparent 65%);pointer-events:none}
.hero-blob-mid{position:absolute;top:30%;left:42%;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.12) 0%,transparent 60%);pointer-events:none}
.hero-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:700px;margin:0 auto;padding:0 24px}
.hero-pill{display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(12px);border-radius:99px;padding:6px 16px 6px 10px;
  font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
  color:rgba(255,255,255,.7);margin-bottom:24px}
.hero-dot{width:8px;height:8px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-violet),var(--c-teal));
  box-shadow:0 0 8px var(--c-violet);
  animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hero h1,.land-title{font-family:var(--ffd);font-size:clamp(28px,6.5vw,50px);font-weight:600;
  line-height:1.06;letter-spacing:-.04em;color:#fff;margin-bottom:14px}
.hero h1 em,.land-title em{font-style:italic;font-weight:400;
  background:linear-gradient(120deg,#a78bfa,#22d3ee 45%,#34d399);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub,.land-sub{color:var(--dark-mut);font-size:14px;max-width:520px;line-height:1.75;margin-bottom:32px}

/* Hero KPI row */
.hero-kpis{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:0}
.hkpi{display:flex;flex-direction:column;gap:3px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);
  backdrop-filter:blur(10px);border-radius:16px;padding:14px 18px;min-width:90px;
  position:relative;overflow:hidden}
.hkpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--c-violet),var(--c-teal))}
.hkpi:nth-child(2)::before{background:linear-gradient(90deg,var(--c-teal),var(--c-green))}
.hkpi:nth-child(3)::before{background:linear-gradient(90deg,var(--c-green),var(--c-amber))}
.hkpi-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--dark-mut)}
.hkpi-val{font-family:var(--ffd);font-size:22px;font-weight:700;color:#fff;letter-spacing:-.03em;line-height:1}
.hkpi-sub{font-size:11px;color:rgba(255,255,255,.4)}

/* Landing layout within hero */
.land{padding:0;text-align:left}

/* ══ MODULE GRID (landing cards) ══ */
.land-cards{padding:24px 0 0}
.mod-grid{display:grid;grid-template-columns:1fr;gap:12px;text-align:left}
@media(min-width:520px){.mod-grid{grid-template-columns:repeat(3,1fr)}}

.mod-card{position:relative;background:var(--card);border-radius:22px;padding:24px 20px 18px;
  border:1.5px solid var(--brd);cursor:pointer;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),box-shadow .25s,border-color .2s;
  overflow:hidden;min-height:200px;display:flex;flex-direction:column;
  box-shadow:0 2px 12px rgba(0,0,0,.04)}
.mod-card:hover{transform:translateY(-5px) scale(1.01);box-shadow:0 20px 56px rgba(0,0,0,.1)}
.mod-card.meta:hover{border-color:var(--meta)}.mod-card.life:hover{border-color:var(--life)}.mod-card.nutr:hover{border-color:var(--nutr-d)}
.mc-stripe{position:absolute;top:0;left:0;right:0;height:3px}
.mod-card.meta .mc-stripe{background:linear-gradient(90deg,var(--meta),var(--c-teal))}
.mod-card.life .mc-stripe{background:linear-gradient(90deg,var(--life),var(--c-green))}
.mod-card.nutr .mc-stripe{background:linear-gradient(90deg,var(--nutr-d),var(--c-amber))}
.mc-ico{font-size:30px;margin-bottom:10px;display:block}
.mc-title{font-family:var(--ffd);font-size:16px;font-weight:600;letter-spacing:-.02em;margin-bottom:6px;color:var(--txt)}
.mc-desc{font-size:11.5px;color:var(--mut);line-height:1.6;flex:1}
.mc-scores{font-size:10px;color:var(--mut);margin-top:5px;font-style:italic}
.mc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.mc-badge{font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px}
.mod-card.meta .mc-badge{background:var(--meta-m);color:var(--meta)}
.mod-card.life .mc-badge{background:var(--life-m);color:var(--life-d)}
.mod-card.nutr .mc-badge{background:var(--nutr-m);color:var(--nutr-d)}
.mc-done{font-size:11px;color:var(--good);font-weight:700}
.mc-arrow{font-size:18px;opacity:.35;transition:opacity .2s,transform .2s}
.mod-card:hover .mc-arrow{opacity:.85;transform:translateX(4px)}

/* CTA row */
.cta-wrap{text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:24px}
.cta-btn{display:inline-flex;align-items:center;gap:10px;
  background:linear-gradient(135deg,var(--c-violet-d),var(--c-teal-d));
  color:#fff;font-weight:700;font-size:14.5px;padding:15px 36px;border-radius:99px;
  box-shadow:0 8px 32px rgba(109,40,217,.35);transition:transform .2s,box-shadow .2s;letter-spacing:-.01em}
.cta-btn:hover{transform:translateY(-3px);box-shadow:0 14px 44px rgba(109,40,217,.45)}
.cta-partial{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1.5px solid rgba(255,255,255,.15);
  font-size:13px;padding:10px 22px;border-radius:99px;font-weight:600;transition:all .18s}
.cta-partial:hover{background:rgba(255,255,255,.14)}
.land-meta{font-size:12px;color:var(--dark-mut)}


/* ══ MODULE TOP BAR — dark pleine largeur ══ */
.mod-topbar{
  background:var(--dark-2);width:100%;
  border-bottom:1px solid var(--dark-border);
  position:relative;overflow:hidden;
}
.mod-topbar::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none}
.mtb-inner{max-width:700px;margin:0 auto;padding:12px 16px 10px;
  display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.mh-back,.mh-close{width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;
  color:rgba(255,255,255,.7);transition:background .15s;cursor:pointer}
.mh-back:hover,.mh-close:hover{background:rgba(255,255,255,.15)}
.mh-icon{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid}
.mh-icon.meta{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.35)}
.mh-icon.life{background:rgba(14,165,201,.2);border-color:rgba(14,165,201,.35)}
.mh-icon.nutr{background:rgba(16,185,129,.2);border-color:rgba(16,185,129,.35)}
.mh-info{flex:1;min-width:0}
.mh-label{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--dark-mut);margin-bottom:1px}
.mh-title{font-weight:700;font-size:13px;color:#fff}
.prog-bar{height:3px;background:rgba(255,255,255,.1);overflow:hidden;position:relative;z-index:1}
.prog-fill{height:100%;transition:width .6s cubic-bezier(.22,1,.36,1)}

/* ══ ACCORDION SECTIONS inside module ══ */
.mod-acc-wrap{max-width:700px;margin:0 auto;padding:16px 16px 0}
details.step-acc{background:var(--card);border-radius:var(--radius-card);
  border:1px solid var(--brd);overflow:hidden;margin-bottom:12px;
  box-shadow:0 2px 12px rgba(0,0,0,.04)}
details.step-acc summary{list-style:none;cursor:pointer;user-select:none;display:block}
details.step-acc summary::-webkit-details-marker{display:none}
details.step-acc[open] .sdb-chev{transform:rotate(180deg)}
.sdb-chev{width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  display:grid;place-items:center;font-size:11px;color:rgba(255,255,255,.6);
  transition:transform .28s cubic-bezier(.4,0,.2,1);flex-shrink:0}
details.step-acc.done-acc .sec-dark-banner{background:linear-gradient(135deg,var(--dark-3),rgba(16,185,129,.12))}
.done-pill{display:inline-flex;align-items:center;gap:4px;
  background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.35);
  border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--c-green);white-space:nowrap}

/* ══ MODULE FINISH BAR (sticky bottom) ══ */
.mod-finish-bar{
  width:100%;position:sticky;bottom:0;z-index:100;
}
.mod-finish-inner{
  background:var(--dark-2);max-width:700px;margin:0 auto;
  padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;
  position:relative;overflow:hidden;
  border-top:1px solid var(--dark-border);
}
.mod-finish-inner::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:20px 20px;pointer-events:none}
.fin-back{position:relative;z-index:1;
  padding:10px 16px;border-radius:11px;border:1.5px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);
  font-weight:600;font-size:12.5px;transition:all .15s;cursor:pointer}
.fin-back:hover{background:rgba(255,255,255,.12)}
.fin-count{font-size:12px;color:var(--dark-mut);text-align:center;flex:1;position:relative;z-index:1}
.fin-count strong{color:#fff;font-weight:700}
.fin-btn{position:relative;z-index:1;
  padding:10px 20px;border-radius:11px;font-weight:700;font-size:13px;color:#fff;
  border:1.5px solid transparent;transition:transform .15s,box-shadow .15s;cursor:pointer}
.fin-btn:hover:not(:disabled){transform:translateY(-2px)}
.fin-btn:disabled{background:rgba(255,255,255,.08)!important;color:rgba(255,255,255,.3);cursor:not-allowed;box-shadow:none}
.fin-btn.meta{background:linear-gradient(135deg,var(--meta),var(--c-teal-d));box-shadow:0 4px 16px rgba(124,58,237,.4)}
.fin-btn.life{background:linear-gradient(135deg,var(--life),var(--c-green));box-shadow:0 4px 16px rgba(14,165,201,.4)}
.fin-btn.nutr{background:linear-gradient(135deg,var(--nutr-d),var(--c-amber));box-shadow:0 4px 16px rgba(4,120,87,.4)}


/* ══ SECTION CARD — dark banner identique questionnaire_contexte ══ */
.sec-card{background:var(--card);border-radius:var(--radius-card);border:1px solid var(--brd);overflow:hidden;margin-bottom:14px;
  box-shadow:0 2px 12px rgba(0,0,0,.04)}

/* Dark section banner header */
.sec-dark-banner{
  background:var(--dark-3);
  padding:16px 20px 14px;
  position:relative;overflow:hidden;
}
.sec-dark-banner::after{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:24px 24px;pointer-events:none}
.sdb-inner{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;gap:12px}
.sdb-left{display:flex;align-items:center;gap:12px}
.sdb-num{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  font-size:18px;flex:0 0 auto}
.sdb-titles strong{font-size:14.5px;font-weight:700;color:#fff;display:block;margin-bottom:2px}
.sdb-titles span{font-size:11.5px;color:var(--dark-mut)}
.sdb-right{display:flex;align-items:center;gap:8px}
.sdb-tag{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:.04em;text-transform:uppercase;border:1px solid}
.sdb-tag.meta{background:rgba(124,58,237,.15);border-color:rgba(124,58,237,.3);color:#a78bfa}
.sdb-tag.life{background:rgba(14,165,201,.15);border-color:rgba(14,165,201,.3);color:var(--c-teal)}
.sdb-tag.nutr{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.3);color:var(--c-green)}
.sdb-count{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--dark-mut)}

/* Old sec-head kept for compat — now invisible */
.sec-head{display:none}

/* Sec body */
.sec-body{padding:18px 20px}
.sec-head-inner{display:none}


/* ══ Q BLOCK — identique questionnaire_contexte fields ══ */
.q-block{padding:16px 20px;border-bottom:1px solid var(--brd)}
.q-block:last-child{border-bottom:none}
.q-num{font-size:10px;font-weight:700;color:var(--mut);opacity:.6;margin-bottom:4px;letter-spacing:.06em;text-transform:uppercase}
.q-label{font-size:14px;font-weight:600;line-height:1.5;margin-bottom:10px;color:var(--txt)}
.q-hint{font-size:11px;color:var(--mut);font-style:italic;margin:-4px 0 10px;
  background:#f6f4f0;padding:7px 11px;border-radius:9px;line-height:1.55;border-left:3px solid var(--brd)}


/* ══ PILL — btn-option style identique questionnaire_contexte ══ */
.pill-row{display:flex;flex-wrap:wrap;gap:7px}
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:11px;
  border:1.5px solid var(--brd);background:#fafaf8;
  font-family:var(--ff);font-size:13px;font-weight:600;color:var(--mut);
  cursor:pointer;user-select:none;white-space:nowrap;
  transition:all .15s cubic-bezier(.34,1.56,.64,1);line-height:1}
.pill:hover{background:#fff;border-color:#94a3b8;color:var(--txt);
  transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.07)}
.pill.sel{font-weight:700;transform:scale(1.02);}

/* ══ CARD CHOICE — identique questionnaire_contexte cchoice ══ */
.card-choices{display:flex;flex-direction:column;gap:5px}
.cchoice{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--brd);
  background:#fafaf8;color:var(--txt);font-size:13px;font-weight:500;
  text-align:left;display:flex;align-items:center;gap:11px;
  transition:all .15s cubic-bezier(.34,1.56,.64,1);line-height:1.45}
.cchoice:hover{border-color:#94a3b8;background:#fff;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.06)}
.cchoice.sel{font-weight:600}
.cc-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--brd);
  display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;transition:all .15s}


/* ══ YN — btn-group style ══ */
.yn-row{display:flex;gap:9px}
.yn-btn{flex:1;padding:11px;border-radius:11px;border:1.5px solid var(--brd);
  background:#fafaf8;font-size:13.5px;font-weight:600;color:var(--mut);
  transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.yn-btn:hover{border-color:#94a3b8;background:#fff;transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.07)}
.yn-btn.sel{color:#fff;font-weight:700}


/* ══ NUM input — style premium ══ */
.num-wrap{display:flex;align-items:center;gap:10px}
.num-stepper{display:flex;align-items:center;background:#fafaf8;border:1.5px solid var(--brd);
  border-radius:var(--radius-input);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.num-stepper:focus-within{border-color:var(--c-teal-d);box-shadow:0 0 0 3px var(--c-teal-glow)}
.num-btn{width:44px;height:48px;background:transparent;color:var(--mut);font-size:22px;font-weight:300;transition:background .15s;flex-shrink:0}
.num-btn:hover{background:#ece9e2}
.num-input{width:76px;height:48px;background:transparent;font-size:18px;font-weight:700;text-align:center;color:var(--txt)}
.num-input::-webkit-inner-spin-button,.num-input::-webkit-outer-spin-button{-webkit-appearance:none}
.num-input[type=number]{-moz-appearance:textfield}
.num-unit{font-size:13px;color:var(--mut);font-weight:500}
.num-ref{font-size:11px;color:var(--mut);background:#f1ede6;padding:4px 9px;border-radius:8px;font-style:italic}

/* ══ EMOJI (ESS) ══ */
.emoji-row{display:flex;gap:6px}
.emoji-btn{flex:1;padding:10px 4px;border-radius:11px;border:1.5px solid var(--brd);background:#fafaf8;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10.5px;color:var(--mut);font-weight:600;transition:all .18s cubic-bezier(.34,1.56,.64,1);text-align:center}
.emoji-btn .eico{font-size:20px}
.emoji-btn:hover{border-color:#94a3b8;background:#fff;transform:translateY(-1px)}
.emoji-btn.sel{color:#fff}

/* ══ ARC SELECTOR ══ */
.arc-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.arc-lbl-row{font-size:11px;color:var(--mut);display:flex;justify-content:space-between;width:100%;max-width:260px}
.arc-svg{overflow:visible;cursor:default}
.arc-seg{cursor:pointer;transition:opacity .12s,transform .12s}
.arc-seg:hover{opacity:.85}

/* ══ FREQ DOTS (MBI 0-6) ══ */
.freq-wrap{display:flex;flex-direction:column;gap:6px}
.freq-dots{display:flex;gap:5px}
.freq-dot{flex:1;height:40px;border-radius:11px;border:1.5px solid var(--brd);background:#fafaf8;color:var(--mut);font-size:14px;font-weight:700;transition:all .15s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;justify-content:center}

   RÉSULTATS — PREMIUM
══════════════════════════════════ */
.res-hero{background:var(--dark-2);color:#fff;border-radius:26px;padding:38px 28px;text-align:center;margin-bottom:18px;position:relative;overflow:hidden}
.res-hero::before{content:'';position:absolute;top:-60px;left:-60px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.4),transparent 70%);pointer-events:none}
.res-hero::after{content:'';position:absolute;bottom:-60px;right:-60px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(4,120,87,.3),transparent 70%);pointer-events:none}
.res-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.res-hero h2{font-family:var(--ffd);font-size:clamp(22px,6vw,32px);font-weight:600;letter-spacing:-.04em;margin-bottom:5px;position:relative}
.res-hero p{font-size:13px;opacity:.55;position:relative;margin-bottom:16px}
.res-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;position:relative}
.res-badge{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;backdrop-filter:blur(10px)}

/* 3 gauges */
.res-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.sum-card{background:var(--card);border-radius:18px;border:1.5px solid var(--brd);padding:18px 12px;text-align:center;transition:transform .2s}
.sum-card:hover{transform:translateY(-2px)}
.sum-ico{font-size:28px;margin-bottom:6px}
.sum-title{font-family:var(--ffd);font-size:13px;font-weight:600;margin-bottom:12px}
.sum-gauge{position:relative;width:80px;height:80px;margin:0 auto 10px}
.sum-gauge svg{width:80px;height:80px}
.g-bg{fill:none;stroke:#e5e2db;stroke-width:7;stroke-linecap:round}
.g-fill{fill:none;stroke-width:7;stroke-linecap:round;stroke-dasharray:188.5;transition:stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1);transform:rotate(-90deg);transform-origin:50% 50%}
.g-val{font-family:var(--ffd);font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:central}
.g-sub{font-size:9px;fill:#94a3b8;text-anchor:middle}
.sum-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;display:inline-block}
.sum-status.good{background:#dcfce7;color:#166534}.sum-status.warn{background:#fef3c7;color:#92400e}.sum-status.bad{background:#fee2e2;color:#991b1b}.sum-status.na{background:#f1f5f9;color:var(--mut)}

/* ── Section wrapper résultats ── */
.r-section{background:var(--card);border-radius:22px;border:1px solid var(--brd);overflow:hidden;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.r-sec-head{background:var(--dark-3);padding:14px 20px;position:relative;overflow:hidden}
.r-sec-head::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
.r-sec-head-inner{position:relative;z-index:1;display:flex;align-items:center;gap:12px}
.r-sec-icon{font-size:22px}
.r-sec-txt h3{font-family:var(--ffd);font-size:16px;font-weight:700;letter-spacing:-.025em;margin-bottom:2px;color:#fff}
.r-sec-txt p{font-size:12px;color:var(--dark-mut);line-height:1.4}

/* Toast */
.toast-msg{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--dark-3);color:#fff;border:1px solid var(--dark-border);
  border-radius:14px;padding:11px 22px;font-size:13px;font-weight:600;
  box-shadow:0 16px 48px rgba(0,0,0,.4);z-index:9999;
  transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .3s;opacity:0}
.toast-msg.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── BODY MAP v2 — card-based conclusions ── */
.body-wrap{padding:16px}
.body-layout{display:flex;gap:14px;align-items:flex-start}
.body-svg-col{flex-shrink:0;width:130px}
.body-svg-col svg{width:100%;height:auto}
.hotspot{cursor:pointer;transition:all .2s}
.hotspot:hover{filter:brightness(1.1)}
.hotspot-ring{fill:none;stroke-width:2;opacity:0;transition:opacity .2s}
.body-conclusions{flex:1;display:flex;flex-direction:column;gap:8px}
/* Conclusion card */
.concl-card{border-radius:14px;padding:12px 14px;cursor:pointer;transition:all .2s;border:1.5px solid transparent}
.concl-card:hover{border-color:rgba(0,0,0,.1)}
.concl-card.active{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.concl-zone{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;opacity:.7;margin-bottom:3px}
.concl-verdict{font-family:var(--ffd);font-size:16px;font-weight:700;letter-spacing:-.02em;line-height:1.2;margin-bottom:4px}
.concl-detail{font-size:11px;opacity:.75;line-height:1.45}
.concl-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.concl-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;background:rgba(255,255,255,.35)}
.concl-card.good{background:linear-gradient(135deg,#f0fdf4,#dcfce7);color:#166534}
.concl-card.warn{background:linear-gradient(135deg,#fffbeb,#fef3c7);color:#92400e}
.concl-card.bad{background:linear-gradient(135deg,#fef2f2,#fee2e2);color:#991b1b}
.concl-card.na{background:#f8f7f4;color:var(--mut)}

/* ── LIFESTYLE grid ── */
.life-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px}
.li-card{border-radius:15px;border:1.5px solid var(--brd);padding:14px 10px 12px;text-align:center;background:var(--bg);transition:transform .2s,box-shadow .2s}
.li-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.07)}
.li-ring-wrap{width:54px;height:54px;position:relative;margin:0 auto 8px}
.li-ring-wrap svg{width:54px;height:54px}
.li-ico{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:20px}
.li-name{font-size:11px;font-weight:700;margin-bottom:3px;line-height:1.3;color:var(--txt)}
.li-val{font-family:var(--ffd);font-size:18px;font-weight:700;line-height:1;color:var(--txt)}
.li-unit{font-size:9px;color:var(--mut);font-weight:400}
.li-verdict{font-size:10px;font-weight:700;margin-top:5px;padding:2px 8px;border-radius:99px;display:inline-block}
.li-verdict.good{background:#dcfce7;color:#166534}.li-verdict.warn{background:#fef3c7;color:#92400e}.li-verdict.bad{background:#fee2e2;color:#991b1b}.li-verdict.na{background:#f1f5f9;color:var(--mut)}

/* ── NUTRITION — rich panel ── */
.nutr-panel{padding:20px}

/* Radar-like visual: 4 quadrant tiles */
.nutr-quads{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.nq-tile{border-radius:16px;padding:16px;position:relative;overflow:hidden}
.nq-tile.hydra{background:linear-gradient(135deg,#eff6ff,#dbeafe)}
.nq-tile.quality{background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.nq-tile.control{background:linear-gradient(135deg,#fefce8,#fef3c7)}
.nq-tile.behavior{background:linear-gradient(135deg,#fdf4ff,#f3e8ff)}
.nq-ico{font-size:26px;margin-bottom:8px}
.nq-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;opacity:.6;margin-bottom:4px}
.nq-score{font-family:var(--ffd);font-size:28px;font-weight:700;line-height:1;letter-spacing:-.03em}
.nq-sub{font-size:11px;opacity:.65;margin-top:2px}
.nq-verdict{font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.5);display:inline-block;margin-top:8px}
.nq-bar{height:4px;background:rgba(0,0,0,.08);border-radius:99px;overflow:hidden;margin-top:10px}
.nq-bar-fill{height:100%;border-radius:99px;background:currentColor;transition:width 1s cubic-bezier(.22,1,.36,1)}

/* Detailed nutrition bars */
.nutr-detail-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-bottom:12px}
.nutr-bars{display:flex;flex-direction:column;gap:7px}
.nb-row{display:flex;align-items:center;gap:9px}
.nb-ico{font-size:15px;width:22px;text-align:center;flex-shrink:0}
.nb-label{font-size:12px;font-weight:600;width:120px;flex-shrink:0;line-height:1.3}
.nb-bar-bg{flex:1;height:8px;background:#f1ede6;border-radius:99px;overflow:hidden}
.nb-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(.22,1,.36,1)}
.nb-val{font-size:11.5px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
/* Food categories with star ratings */
.food-cats{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:16px}
.food-cat{background:var(--bg);border-radius:13px;padding:12px 13px;border:1px solid var(--brd)}
.food-cat-name{font-size:11.5px;font-weight:700;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.food-cat-stars{display:flex;gap:2px}
.star{font-size:12px;transition:all .3s}
.food-cat-tip{font-size:10.5px;color:var(--mut);line-height:1.4;margin-top:3px}

/* ── RECOMMENDATIONS v4 ── */
.reco-tabs{display:flex;gap:6px;padding:16px 20px 0;border-bottom:1px solid var(--brd);overflow-x:auto;scrollbar-width:none}
.reco-tabs::-webkit-scrollbar{display:none}
.reco-tab{padding:8px 16px;border-radius:10px 10px 0 0;font-size:12px;font-weight:700;color:var(--mut);background:transparent;transition:all .18s;white-space:nowrap;border:1.5px solid transparent;border-bottom:none;margin-bottom:-1.5px}
.reco-tab.active{color:var(--txt);background:var(--card);border-color:var(--brd);border-bottom-color:var(--card)}
.reco-list{padding:16px;display:flex;flex-direction:column;gap:8px}
.reco-item{border-radius:15px;padding:15px;display:flex;gap:12px;align-items:flex-start;border:1px solid}
.reco-item.good{background:#f0fdf4;border-color:#bbf7d0}
.reco-item.warn{background:#fffbeb;border-color:#fde68a}
.reco-item.bad{background:#fef2f2;border-color:#fecaca}
.reco-left{flex-shrink:0;text-align:center}
.reco-emoji{font-size:24px;display:block;margin-bottom:3px}
.reco-cls{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.reco-cls.good{color:var(--good)}.reco-cls.warn{color:var(--warn)}.reco-cls.bad{color:var(--bad)}
.reco-body{flex:1}
.reco-title{font-weight:700;font-size:14px;margin-bottom:5px;line-height:1.3}
.reco-item.good .reco-title{color:#166534}.reco-item.warn .reco-title{color:#92400e}.reco-item.bad .reco-title{color:#991b1b}
.reco-text{font-size:12.5px;line-height:1.65;color:var(--mut)}
.reco-actions{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.reco-action{font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;background:rgba(0,0,0,.05);color:inherit;opacity:.8}

.r-actions{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.r-btn{background:var(--bg);border:1.5px solid var(--brd);color:var(--txt);font-weight:600;font-size:13.5px;padding:13px;border-radius:13px;width:100%;transition:all .18s}
.r-btn:hover{border-color:#94a3b8;background:#ece9e2}
.disc{font-size:10.5px;color:var(--mut);text-align:center;line-height:1.75;padding:16px;border-top:1px solid var(--brd);margin-top:6px}

@media(max-width:480px){
  .body-layout{flex-direction:column}
  .body-svg-col{width:100%;max-width:160px;margin:0 auto}
  .life-grid{grid-template-columns:repeat(2,1fr)}
  .nutr-quads{grid-template-columns:1fr}
  .food-cats{grid-template-columns:1fr}
  .res-summary{gap:7px}
}

function isVisible(q){
  if(!q.skipIf)return true;

  if(!isVisible(q))return true;

function interp(k,v){
  if(v===undefined||v===null)return{cls:'na',lbl:'Non renseigné'};
  const G=(l,s)=>({cls:'good',lbl:l,sub:s||''});const W=(l,s)=>({cls:'warn',lbl:l,sub:s||''});const B=(l,s)=>({cls:'bad',lbl:l,sub:s||''});
  switch(k){
    case 'homaIR':  return v<1?G('Sensibilité insulinique optimale','Excellent — pas de signe de résistance'):v<2?G('Légèrement élevé','Surveiller glycémie et alimentation'):v<3?W('Début de résistance à l\'insuline','Réduire sucres rapides, augmenter activité'):B('Insulino-résistance','Bilan diabétologique recommandé');
    case 'metsIR':  return v<45?G('Pas de risque métabolique','Bon équilibre insuline / lipides'):v<=50?W('Risque métabolique modéré','Attention au surpoids abdominal'):B('Risque IR élevé','Syndrome métabolique probable');
    case 'fib4':    return v<1.3?G('Foie sain','Fibrose hépatique peu probable'):v<2.67?W('Zone d\'incertitude','FibroScan conseillé'):B('Fibrose avancée probable','Suivi hépatologique recommandé');
    case 'kfre':    return v<5?G('Risque rénal faible','Fonction rénale bien préservée'):v<20?W('Risque rénal modéré','Surveillance annuelle conseillée'):B('Risque rénal élevé','Suivi néphrologue indispensable');
    case 'htaScore':return v<=5?G('Faible risque d\'hypertension','Bon profil cardiovasculaire'):v<=12?W('Risque HTA modéré','Sel < 5g/j, activité physique'):B('Risque HTA élevé','Suivi tension artérielle régulier');
    case 'hba1c':  return v<5.7?G('Glycémie chronique normale','Pas de signe de prédiabète ou de diabète'):v<6.5?W('Prédiabète probable','HbA1c 5.7-6.4% — alimentation et activité physique en urgence'):B('Diabète de type 2','HbA1c ≥ 6.5% — suivi diabétologique indispensable');
    case 'gly':    return v<100?G('Glycémie à jeun normale','Pas d\'hyperglycémie détectée'):v<126?W('Prédiabète','Glycémie 100-125 mg/dL — alimentation à optimiser'):B('Diabète probable','Glycémie ≥ 126 mg/dL — confirmation HbA1c nécessaire');
    case 'hb':     return v>=(ST.a.sex===0?12:13)?G('Hémoglobine normale'):v>=(ST.a.sex===0?11:12)?W('Anémie légère possible','Bilan ferritine, B12, folates'):B('Anémie probable','Consultation médicale urgente');
    case 'anemia': return v===0?G('Pas de signe d\'anémie ferriprive','Bilan fer et hémoglobine dans les normes'):v===1?W('Carence en fer subclinique','Ferritine basse sans anémie déclarée — supplémentation à discuter'):v===2?W('Anémie légère','Hémoglobine limite — bilan complémentaire conseillé'):B('Anémie ferriprive probable','Hémoglobine basse + ferritine effondrée — traitement nécessaire');
    case 'castelli':return v<4?G('Risque cardiovasculaire faible','Bon ratio cholestérol'):v<=5?W('Risque CV intermédiaire','Améliorer alimentation et activité'):B('Risque CV élevé','Bilan cardiologique conseillé');
    case 'tgHdl':   return v<2?G('Sensibilité insulinique correcte','Pas de signe de résistance lipidique'):v<=3.5?W('Risque modéré','Réduire sucres, augmenter oméga-3'):B('Insulino-résistance lipidique','Risque cardiovasculaire accru');
    case 'egfr':    return v>=90?G('Fonction rénale normale'):v>=60?G('Légèrement réduite (G2)','Surveiller annuellement'):v>=45?W('Modérément réduite (G3a)','Suivi régulier recommandé'):v>=30?W('Sévèrement réduite (G3b)'):v>=15?B('Insuffisance rénale sévère (G4)'):B('Insuffisance rénale terminale (G5)');
    case 'fer':     {
      const sx=ST.a.sex;
      if(v===undefined||v===null)return{cls:'na',lbl:'Non renseigné',sub:''};
      const ferLow=sx===0?v<15:v<30;
      const ferHigh=sx===0?v>150:v>300;
      if(ferLow)return B('Ferritine effondrée','Carence martiale probable — fatigue, chute de cheveux, baisse immunitaire');
      if(sx===0&&v<30)return W('Ferritine limite basse','Baisser en dessous de 15 = risque d\'anémie ferriprive');
      if(ferHigh&&v>500)return B('Ferritine très élevée','Surcharge en fer ou syndrome inflammatoire — bilan complémentaire');
      if(ferHigh)return W('Ferritine élevée','Possiblement inflammatoire — CRP à vérifier');
      return G('Ferritine normale','Réserves en fer satisfaisantes');
    }
    case 'nlr':     return v<2?G('Inflammation faible'):v<=3.5?W('Inflammation modérée'):B('Inflammation sévère');
    case 'plr':     return v<150?G('Normal'):v<200?W('Modérément élevé'):B('Risque thrombotique');
    case 'inflamm': return v<=3?G('Inflammation minimale','Excellent profil anti-inflammatoire'):v<=8?W('Inflammation de bas grade','Oméga-3, curcuma, alimentation anti-inflammatoire'):v<=14?W('Inflammation modérée','Bilan complémentaire conseillé'):B('Inflammation élevée','Suivi médical indispensable');
    case 'chronotype':return v>=19?G('Chronotype matinal','Rythme circadien optimal'):v>=14?G('Intermédiaire-matinal','Bon alignement biologique'):v>=9?W('Chronotype vespéral','Risque de déficit de sommeil chronique'):B('Très vespéral','Risque +30% maladies chroniques');
    case 'isi':     return v<=7?G('Pas d\'insomnie','Vous dormez bien !'):v<=14?W('Insomnie sous-clinique','Hygiène du sommeil à améliorer'):v<=21?B('Insomnie modérée','TCC-I recommandée (thérapie cognitivo-comportementale)'):B('Insomnie sévère','Suivi spécialisé indispensable');
    case 'psqi':    return v<=5?G('Bonne qualité de sommeil'):v<=10?W('Qualité perturbée','Rituel du soir et environnement à optimiser'):B('Très mauvaise qualité','Consultation médecin du sommeil');
    case 'ess':     return v<=10?G('Somnolence normale'):v<=15?W('Somnolence diurne excessive','Explorer privation de sommeil ou apnée'):B('Somnolence sévère','Polysomnographie recommandée');
    case 'fss':     return v<4?G('Pas de fatigue pathologique'):v<5?W('Fatigue modérée','Bilan thyroïde, ferritine, vitamine D'):B('Fatigue sévère','COVID long, fibromyalgie, bilan complet à envisager');
    case 'pss':     return v<=13?G('Stress faible','Bonne gestion du stress'):v<=26?W('Stress modéré','Mindfulness, cohérence cardiaque, TCC'):B('Stress élevé','Accompagnement psychologique recommandé');
    case 'gad':     return v<5?G('Anxiété minimale'):v<10?W('Anxiété légère','Techniques de relaxation, cohérence cardiaque'):v<15?B('Anxiété modérée','Évaluation spécialisée recommandée'):B('Anxiété sévère','Suivi psy indispensable');
    case 'phq':     return v<5?G('Pas de dépression'):v<10?W('Symptômes légers','Activité physique, lumière naturelle, lien social'):v<15?B('Dépression modérée','Accompagnement recommandé'):v<20?B('Dépression mod-sévère','Suivi psychiatrique'):B('Dépression sévère','Urgence — suivi immédiat');
    case 'mbi':     return v<=18?G('Pas de burn-out','Bon équilibre travail-vie'):v<=36?W('Risque de burn-out modéré','Réduire la charge, mettre des limites'):B('Burn-out probable','Arrêt de travail à envisager avec votre médecin');
    case 'audit':   return v===0?G('Non-consommateur(rice)'):v<=7?G('Faible risque'):v<=15?W('Consommation à risque','Objectif : < 14 verres/sem (H), < 7 verres/sem (F)'):v<=19?B('Consommation nocive','Réduction progressive recommandée'):B('Dépendance probable','Aide médicale à l\'arrêt');
    case 'cage':    return v===0?G('Pas de signal'):v===1?W('Signal faible','Surveiller la consommation'):B('Dépistage positif','Évaluation médicale recommandée');
    case 'fager':   return v===0?G('Non-fumeur(se)'):v<=2?W('Dépendance faible','Patch ou varenicline selon avis médical'):v<=4?W('Dépendance légère','Substituts nicotiniques recommandés'):v<=6?B('Dépendance modérée','Combinaison thérapeutique'):B('Dépendance forte','Traitement médicamenteux indispensable');
    case 'ecrans':  return v<=6?G('Usage contrôlé'):v<=12?W('Usage excessif','Coupure 1h avant coucher, loisirs hors-écrans'):B('Problématique','Risque de trouble de l\'attention, insomnie, isolement');
    case 'ipaq':    return v>=3000?G('Très actif(ve)','Objectif OMS largement dépassé'):v>=600?W('Actif(ve) modéré(e)','Viser 150 min/sem activité modérée'):B('Insuffisamment actif(ve)','Risque +30% maladies chroniques — bougez !');
    case 'baecke':  return v>=3.5?G('Mode de vie actif'):v>=2.5?W('Modérément actif(ve)'):B('Mode de vie sédentaire');
    case 'sedent':  return v<4?G('Faible sédentarité'):v<6?W('Sédentarité modérée','Pause active toutes les 45 min'):v<8?B('Sédentarité élevée','Risque cardiovasculaire'):B('Très sédentaire','Risque majeur — brisez le cycle assis !');
    case 'hydra':   return v>=18?G('Hydratation excellente','Vous couvrez bien vos besoins hydriques'):v>=12?W('Hydratation à améliorer','Viser 8 verres d\'eau/j'):B('Hydratation insuffisante','Risque de déshydratation chronique');
    case 'urine':   return v>=6?G('Bien hydraté(e)','Couleur optimale des urines'):v>=4?W('Légèrement insuffisant','Boire plus entre les repas'):B('Déshydratation','Augmentez votre apport hydrique dès maintenant');
    case 'dash':    return v>=25?G('Excellent score DASH','Alimentation cardioprotectrice'):v>=15?W('Score DASH modéré','↑ légumes, fruits, réduire sel et viande rouge'):B('Score DASH faible','Alimentation à revoir en profondeur');
    case 'meddiet': return v>=10?G('Régime méditerranéen élevé','Réduction risque CV de 20%'):v>=6?W('Adhérence modérée','↑ huile olive, poisson, noix'):B('Adhérence faible','L\'alimentation méditerranéenne est la mieux validée scientifiquement');
    case 'mind':    return v>=12?G('MIND Diet élevée','Réduction risque Alzheimer de 53%'):v>=7?W('Adhérence modérée','↑ légumes verts, baies 2×/sem'):B('Adhérence faible','Protection cognitive insuffisante');
    case 'omega3':  return v>=15?G('Bon statut en Oméga-3','Équilibre Ω3/Ω6 favorable'):v>=9?W('À améliorer','Poisson gras 3×/sem + lin/colza'):B('Déficit en Oméga-3','Inflammation, risque CV et cognitif augmentés');
    case 'sel':     return v>=14?G('Faible consommation de sel','< 5g/j — objectif OMS atteint'):v>=9?W('Sel à réduire','Éviter les aliments transformés'):B('Excès de sel','Risque HTA, rénaux et cardiovasculaire');
    case 'upf':     return v>=14?G('Peu d\'aliments ultra-transformés','Excellent — cuisine maison'):v>=9?W('Consommation modérée d\'UPF','Remplacer progressivement'):B('Excès d\'ultra-transformés','Les UPF sont liés au cancer, obésité, maladies chroniques');
    case 'tfeq':    return v<=12?G('Alimentation équilibrée','Bonne relation avec la nourriture'):v<=24?W('Comportements à surveiller','Alimentation émotionnelle modérée'):B('Compulsion alimentaire probable','Suivi nutritionnel et soutien psychologique');
    case 'rythme':  return v>=21?G('Rythme alimentaire optimal','Régularité, lenteur, pleine conscience'):v>=13?W('Rythme irrégulier','Structurer 3 repas, manger lentement sans écrans'):B('Rythme alimentaire désorganisé','Chrono-nutrition et encadrement recommandés');
    default: return{cls:'na',lbl:'—',sub:''};
  }
}

function interpPct(k,v){
  const d={
    homaIR:{max:5,hi:false},metsIR:{max:80,hi:false},hba1c:{max:10,hi:false},gly:{max:200,hi:false},hb:{max:20,hi:true},anemia:{max:3,hi:false},fib4:{max:4,hi:false},kfre:{max:40,hi:false},
    htaScore:{max:27,hi:false},castelli:{max:8,hi:false},tgHdl:{max:6,hi:false},egfr:{max:130,hi:true},
    fer:{max:500,hi:false},nlr:{max:8,hi:false},plr:{max:400,hi:false},inflamm:{max:22,hi:false},chronotype:{max:25,hi:true},
    isi:{max:28,hi:false},psqi:{max:21,hi:false},ess:{max:24,hi:false},fss:{max:7,hi:false},
    pss:{max:40,hi:false},gad:{max:21,hi:false},phq:{max:27,hi:false},mbi:{max:54,hi:false},
    audit:{max:40,hi:false},cage:{max:4,hi:false},fager:{max:10,hi:false},ecrans:{max:24,hi:false},
    ipaq:{max:4000,hi:true},baecke:{max:5,hi:true},sedent:{max:16,hi:false},
    hydra:{max:21,hi:true},urine:{max:8,hi:true},dash:{max:35,hi:true},meddiet:{max:14,hi:true},
    mind:{max:15,hi:true},omega3:{max:18,hi:true},sel:{max:18,hi:true},upf:{max:18,hi:true},
    tfeq:{max:36,hi:false},rythme:{max:27,hi:true},
  };
  if(!d[k]||v===undefined||v===null)return 0;
  const{max,hi}=d[k];
  return Math.min(100,Math.max(5,hi?Math.round(v/max*100):Math.round((1-v/max)*100)));
}

function buildRecos(S){
  const R=[];
  function G(ico,title,body,actions){R.push({cls:'good',ico:ico||'🎉',title,body,actions:actions||[]});}
  function W(ico,title,body,actions){R.push({cls:'warn',ico:ico||'⚠️',title,body,actions:actions||[]});}
  function B(ico,title,body,actions){R.push({cls:'bad',ico:ico||'🔴',title,body,actions:actions||[]});}

  // Métabolique
  if(S.homaIR>=2)(S.homaIR>=3?B:W)('🍬',`Résistance à l'insuline (HOMA-IR ${S.homaIR})`,`Votre insulinémie est élevée par rapport à votre glycémie, signe d'une résistance à l'insuline. Ce mécanisme favorise la prise de poids abdominale, le diabète de type 2 et les maladies cardiovasculaires.`,['Réduire glucides rapides et ultra-transformés','Augmenter les fibres solubles (avoine, légumineuses)','Activité physique après les repas (marche 10 min)','Consulter un endocrinologue si HOMA-IR > 3','Envisager jeûne intermittent avec supervision']);
  if(S.fib4>=1.3)(S.fib4>=2.67?B:W)('🫘',`Santé hépatique à surveiller (FIB-4 ${S.fib4})`,`Le score FIB-4 évalue le risque de fibrose hépatique. Un résultat ≥ 1.3 suggère qu'un FibroScan ou une échographie hépatique est recommandé pour écarter une stéatose ou fibrose avancée.`,['Supprimer l\'alcool ou le réduire drastiquement','Éviter les aliments ultra-transformés','Augmenter la choline (oeufs, foie)','Demander un FibroScan à votre médecin']);
  if(S.kfre>=5)(S.kfre>=20?B:W)('🩺',`Risque rénal à surveiller (${S.kfre}% à 5 ans)`,`Votre score KFRE indique un risque de progression vers une insuffisance rénale chronique. La surveillance annuelle de la créatinine et de l'albuminurie est essentielle.`,['Maintenir une tension artérielle < 130/80','Réduire le sel (< 5g/j)','Hydratation suffisante (1.5L/j minimum)','Éviter les anti-inflammatoires (AINS)','Suivi néphrologue si risque > 20%']);
  if(S.htaScore>=6)(S.htaScore>=13?B:W)('❤️',`Risque d'hypertension (score ${S.htaScore}/27)`,`Plusieurs facteurs de risque HTA sont identifiés. L'hypertension non traitée est le premier facteur de risque d'AVC et d'infarctus en France.`,['Mesurer votre tension à domicile (3×/jour × 7 jours)','Réduire sel, alcool, caféine','Adopter un régime DASH','Activité physique aérobie 30 min/jour','Cohérence cardiaque pour réduire le stress']);
  if(S.castelli>=5)B('🫀',`Risque cardiovasculaire élevé (CT/HDL ${S.castelli})`,`Le ratio Castelli est un marqueur fort du risque athérosclérotique. Un résultat > 5 double le risque d'événements cardiovasculaires.`,['Augmenter le HDL : activité physique, oméga-3, noix','Réduire LDL : moins de graisses saturées','Consommer oméga-3 quotidiennement','Consulter un cardiologue pour bilan complet','Envisager un traitement si LDL > 160 mg/dL']);
  if(S.inflamm>=9)(S.inflamm>=14?B:W)('🔥',`Inflammation chronique de bas grade (${S.inflamm}/22)`,`Plusieurs marqueurs inflammatoires (CRP, VS, ferritine, GGT...) sont élevés. L'inflammation chronique est le terrain commun des maladies cardiovasculaires, métaboliques et neurodégénératives.`,['Adopter une alimentation anti-inflammatoire (MIND/Méditérranéenne)','Oméga-3 : 2g/j de EPA+DHA ou poisson gras 3×/sem','Curcuma + poivre noir : anti-inflammatoire puissant','Réduire sucres raffinés, alcool, viandes transformées','Gestion du stress et sommeil réparateur']);
  if(S.hba1c>=5.7)(S.hba1c>=6.5?B:W)('🍬',`Contrôle glycémique (HbA1c ${S.hba1c}%)`,S.hba1c>=6.5?`Votre HbA1c indique un diabète de type 2. Une prise en charge médicale est indispensable pour éviter les complications rénales, cardiovasculaires et neurologiques.`:`Votre HbA1c est dans la zone prédiabète. C'est le moment idéal pour inverser la tendance — cette fenêtre est réversible avec les bons changements.`,['Réduire sucres rapides et aliments à IG élevé','Marche 10 min après chaque repas (baisse glycémie de 15%)','Alimentation méditerranéenne avec légumineuses','Consulter un diabétologue ou un médecin nutritionniste','Envisager metformine si HbA1c > 6% avec autres FR']);
  if(S.gly>=100&&!ok('hba1c'))W('📊',`Glycémie à jeun élevée (${S.gly} mg/dL)`,`Votre glycémie à jeun dépasse les normes. Sans HbA1c, il est difficile de savoir si c\'est ponctuel ou chronique.`,['Répéter à jeun complet (12h) pour confirmer','Faire doser l\'HbA1c pour voir la tendance sur 3 mois','Réduire sucres, jus, pain blanc','Activer les muscles après les repas']);
  if(S.anemia>=2)B('🩸',`Risque d\'anémie ferriprive (score ${S.anemia}/3)`,`La combinaison d\'une hémoglobine basse et d'une ferritine effondrée est caractéristique de l'anémie ferriprive — la plus fréquente en France, surtout chez les femmes.`,['Bilan complet NFS + ferritine + B12 + folates','Fer ferreux ou fer hémique (viande rouge, boudin noir)','Vit C au moment du repas pour améliorer l\'absorption','Consultation médicale urgente si Hb < 10 g/dL','Éviter thé et café pendant les repas (inhibent l\'absorption du fer)']);
  else if(S.anemia===1)W('🩸',`Carence en fer subclinique`,`Votre ferritine est basse sans anémie déclarée — c\'est le stade pré-anémique, fréquemment associé à une fatigue chronique et une baisse des performances cognitives.`,['Doser ferritine + saturation transferrine','Augmenter les sources de fer : foie, viande rouge, légumineuses','Supplémenter en fer ferreux 80mg/j si ferritine < 15','Réévaluation dans 3 mois']);
  if(S.chronotype<=8)W('🦉','Chronotype très vespéral',`Un chronotype très vespéral est associé à un risque +30% de maladies chroniques, de dépression et d'obésité. Le décalage entre votre horloge biologique et vos horaires sociaux crée un "social jetlag".`,['Lever fixe 7j/7, même le week-end','Exposition à la lumière naturelle dès le réveil (10-15 min)','Éviter la lumière bleue après 21h','Décaler progressivement le coucher de 15 min/semaine','Mélatonine 0.5mg 1h avant l\'heure cible de coucher']);
  if(S.egfr&&S.egfr<60)B('🩺',`Fonction rénale réduite (eGFR ${S.egfr} mL/min)`,`Votre filtration glomérulaire est en dessous du seuil normal. Un suivi néphrologue est indispensable pour ralentir la progression.`,['Réduire les protéines animales (< 0.8g/kg/j)','Contrôle strict de la tension artérielle','Éviter les médicaments néphrotoxiques (AINS)','Suivi créatinine et albuminurie tous les 6 mois','Consulter un néphrologue']);

  // Lifestyle
  if(S.isi>=8)(S.isi>=22?B:W)('😴',`Insomnie (ISI ${S.isi}/28)`,`Votre profil suggère une insomnie significative. L'insomnie chronique augmente le risque de dépression, de maladies cardiovasculaires et affaiblit le système immunitaire.`,['Heure de lever fixe 7j/7 (la règle d\'or)','Éviter les écrans 1h avant de dormir','Chambre fraîche (18°C), sombre et silencieuse','Technique de relaxation musculaire progressive (Jacobson)','TCC-I : la thérapie cognitive-comportementale pour l\'insomnie est plus efficace que les somnifères','Limiter caféine après 14h']);
  if(S.ess>=11)(S.ess>=16?B:W)('🥱',`Somnolence diurne excessive (ESS ${S.ess}/24)`,`Une somnolence diurne élevée peut signaler un syndrome d'apnées du sommeil (SAOS) ou une privation chronique de sommeil.`,['Consulter votre médecin pour un test de dépistage SAOS','Augmenter la durée de sommeil (objectif 7-9h)','Éviter l\'alcool le soir (aggrave les apnées)','Dormir sur le côté si suspicion d\'apnées','Prise en charge par CPAP si SAOS confirmé']);
  if(S.fss>=4)(S.fss>=5?B:W)('⚡',`Fatigue chronique (FSS ${S.fss}/7)`,`Votre score de fatigue est significativement élevé. Plusieurs causes sont à explorer : déficits nutritionnels, dysfonction thyroïdienne, anémie ferriprive, ou séquelles de COVID-19.`,['Bilan sanguin : TSH, T4L, ferritine, vitamine D, B12','Optimiser le sommeil en priorité','Activité physique douce progressive (contre-intuitif mais efficace)','Magnésium bisglycinate 300mg/j','Identifier et traiter la cause sous-jacente','Envisager une consultation médecine fonctionnelle']);
  if(S.pss>=14)(S.pss>=27?B:W)('🧠',`Stress élevé (PSS ${S.pss}/40)`,`Votre niveau de stress perçu est élevé. Le stress chronique est délétère pour le système cardiovasculaire, immunitaire et le microbiote intestinal.`,['Cohérence cardiaque : 5-3-5 (5min, 3×/jour)','Mindfulness : application Petit Bambou ou Headspace','Activité physique : le meilleur anxiolytique naturel','Journaling quotidien : 3 gratitudes par jour','Adapter votre charge de travail si possible','Consulter un psychologue TCC si PSS > 27']);
  if(S.gad>=5)(S.gad>=15?B:W)('😰',`Anxiété (GAD-7 ${S.gad}/21)`,`Votre score GAD-7 indique une anxiété notable. L'anxiété non traitée aggrave les troubles du sommeil, les douleurs chroniques et réduit la qualité de vie.`,['Respiration diaphragmatique (4-7-8)','Limiter caféine et alcool (anxiogènes)','Activité physique aérobie 30 min/jour','Réduire l\'exposition aux informations anxiogènes','Thérapie TCC ou ACT si GAD-7 ≥ 10']);
  if(S.phq>=5)(S.phq>=10?B:W)('😔',`Humeur dépressive (PHQ-9 ${S.phq}/27)`,`Votre score PHQ-9 suggère des symptômes dépressifs. La dépression est une maladie traitable — ne restez pas seul(e) avec ces difficultés.`,['Parlez-en à votre médecin généraliste en premier lieu','Activité physique : aussi efficace qu\'un antidépresseur léger','Lumière naturelle : 30 min/matin','Lien social et engagement communautaire','Thérapie TCC, IPT ou médicaments selon la sévérité']);
  if(S.mbi>=19)(S.mbi>=37?B:W)('🔥',`Épuisement professionnel (MBI ${S.mbi}/54)`,`Votre score MBI indique un risque de burn-out significatif. Le burn-out est une réponse à un stress chronique au travail — il ne s'agit pas d'une faiblesse, mais d'une urgence.`,['Parler à votre médecin pour un éventuel arrêt de travail','Identifier les sources de surcharge et les déléguer','Récupérer en dehors du travail : sport, nature, lien social','Consulter un psychologue spécialisé burn-out','Aucun mail professionnel après 19h — règle ferme']);
  if(S.audit>=8&&a.boit===1)(S.audit>=20?B:W)('🍷',`Consommation d'alcool (AUDIT ${S.audit}/40)`,`Votre consommation d'alcool dépasse les seuils à risque. L'alcool est cancérigène, hépatotoxique, perturbe le sommeil et favorise la dépression.`,['Objectif : 0 à 2 verres/occasion, < 10/sem','Jours sans alcool : 2 à 3 minimum par semaine','Remplacer par eau pétillante, kombucha, jus de grenade','Consulter votre médecin pour une aide à la réduction','Nalméfène ou naltrexone si dépendance confirmée']);
  if(S.fager>=3&&a.tf===1)(S.fager>=7?B:W)('🚬',`Tabagisme (Fagerström ${S.fager}/10)`,`La dépendance tabagique est élevée. Le tabac est la première cause de mortalité évitable en France, mais l'arrêt est possible à tout âge avec une aide adaptée.`,['Patch + gomme nicotine en combinaison (plus efficace qu\'un seul)','Varenicline (Champix) : le traitement le plus efficace','Application Tabac Info Service ou consultez un tabacologue','Date d\'arrêt fixée + élimination des cigarettes à la maison','Activité physique pour gérer les envies (10 min = envie passée']);
  if(S.ecrans>=7)W('📱',`Usage problématique des écrans (${S.ecrans}/24)`,`L'usage excessif des écrans perturbe le sommeil, réduit l'attention et augmente le risque de dépression et d'anxiété.`,['Mode "pas de dérangement" de 21h à 7h','Supprimer les notifications non essentielles','Écran blanc et noir le soir (mode nuit iPhone/Android)','Désigner des "zones sans écran" (table, chambre)','Application de bien-être numérique pour visualiser l\'usage']);
  if(S.ipaq!==undefined&&S.ipaq<600)B('🏃',`Activité physique insuffisante (${S.ipaq} MET/sem)`,`L'inactivité physique est le 4e facteur de risque de décès prématuré dans le monde. Moins de 600 MET/sem équivaut à moins de 30 min de marche par jour.`,['Objectif OMS : 150 min/sem d\'activité modérée','Commencer par 10 min de marche après chaque repas','Intégrer activité dans la routine : escaliers, vélo, marche','Trouver une activité plaisante (dance, natation, badminton)','Programme HIIT 2×/sem : 20 min suffisent','Podomètre : objectif 8000 pas/jour']);
  if(S.sedent>=6)(S.sedent>=8?B:W)('🪑',`Sédentarité (${S.sedent}h/j)`,`Même avec une activité physique régulière, rester assis > 6h/j augmente indépendamment le risque cardiovasculaire et de mortalité.`,['Pause active toutes les 45-60 min (5 min suffit)','Bureau debout ou tapis de marche','Appels téléphoniques debout ou en marchant','Étirements dynamiques toutes les 2h','Réunions debout — standing meetings','Application rappel de mouvement (Stretchly, Stand Up!)']);

  // Nutrition — priorité

function updateAccordion(){
  const mod=M[ST.mod];if(!mod)return;
  const color=mod.color;
  const totalQs=mod.steps.reduce((s,st)=>s+st.qs.length,0);
  const answeredAll=mod.steps.reduce((s,st)=>s+st.qs.filter(q=>isAnswered(q)).length,0);
  const allDone=mod.steps.every(st=>isStepDone(st));
  const pct=Math.round(answeredAll/totalQs*100);
  // Progress fill
  const pf=document.getElementById('mod-prog-fill');if(pf)pf.style.width=pct+'%';
  // Top bar count
  const mhTitle=document.querySelector('.mh-title');
  if(mhTitle)mhTitle.textContent=`${mod.steps.length} questionnaires · ${answeredAll}/${totalQs} réponses`;
  // Bottom bar
  const fc=document.querySelector('.fin-count');if(fc)fc.innerHTML=`<strong>${answeredAll}/${totalQs}</strong> réponses`;
  const fb=document.getElementById('fin-btn');
  if(fb){fb.disabled=!allDone;fb.textContent=allDone?'✓ Terminer':'En cours…';}
  // Update each accordion header badge
  mod.steps.forEach(step=>{
    const done=isStepDone(step);
    const answered=step.qs.filter(q=>isAnswered(q)).length;
    const acc=document.getElementById('acc-'+step.id);
    if(!acc)return;
    if(done)acc.classList.add('done-acc');else acc.classList.remove('done-acc');
    const badge=acc.querySelector('.sdb-right .sdb-count, .sdb-right .done-pill');
    if(badge){
      if(done){badge.className='done-pill';badge.textContent='✓ Complété';}
      else{badge.className='sdb-count';badge.textContent=answered+'/'+step.qs.length;}
    }
    // Auto-open next section when current is complete
    if(done){
      const nextIdx=mod.steps.indexOf(step)+1;
      if(nextIdx<mod.steps.length){
        const nextAcc=document.getElementById('acc-'+mod.steps[nextIdx].id);
        if(nextAcc&&!nextAcc.open)nextAcc.open=true;
      }
    }
  });
  // Notify parent (app.html) of progress for live progress bar
  try{
    if(window.parent&&window.parent!==window){
      var sections=mod.steps.map(function(step){
        var ans=step.qs.filter(function(q){return isAnswered(q);}).length;
        return {id:step.id,title:step.title||step.id,answered:ans,total:step.qs.length,done:isStepDone(step)};
      });
      window.parent.postMessage({
        type:'previo-progress',
        mod:ST.mod,
        answered:answeredAll,
        total:totalQs,
        pct:pct,
        done:allDone,
        sections:sections
      },'*');
    }
  }catch(e){}
}
function renderQ(q,color,cls,idx){

  const v=ST.a[q.id];
  let h=`<div class="q-block" id="qb-${q.id}">`;
  if(idx)h+=`<div class="q-num">Question ${idx}</div>`;
  h+=`<div class="q-label">${q.label}</div>`;
  if(q.hint)h+=`<div class="q-hint">ℹ️ ${q.hint}</div>`;

  if(q.type==='ch'){
    const opts=q.opts||[];
    const usePills=opts.length<=5&&opts.every(o=>o.length<=24);
    if(usePills){
      h+=`<div class="pill-row">`;
      opts.forEach((opt,i)=>{const sel=v===i;const sty=sel?`border-color:${color};background:${color}1a;color:${color}`:'';h+=`<button class="pill${sel?' sel':''}" style="${sty}" onclick="pick('${q.id}',${i})">${opt}</button>`;});
      h+=`</div>`;
    }else{

      h+=`</div>`;
    }
  }else if(q.type==='yn'){
    h+=`<div class="yn-row">`;
    q.lbs.forEach((lbl,i)=>{const vv=q.vs[i];const sel=v===vv;const sty=sel?`border-color:${color};background:${color};color:#fff`:'';h+=`<button class="yn-btn${sel?' sel':''}" style="${sty}" onclick="pick('${q.id}',${vv})">${lbl}</button>`;});
    // If gate question and "Non" selected, show skip notice
    if(q.gate&&v===0){

    }
    h+=`</div>`;
  }else if(q.type==='num'){
    const curV=v!==undefined&&v!==null&&v!==''?v:'';const sv=q.step||1;
    h+=`<div class="num-wrap"><div class="num-stepper"><button class="num-btn" onclick="numAdj('${q.id}',${-sv},${q.min||0},${q.max||9999},${sv})">−</button><input type="number" class="num-input" value="${curV}" min="${q.min||0}" max="${q.max||9999}" step="${sv}" oninput="numInput('${q.id}',this.value)" /><button class="num-btn" onclick="numAdj('${q.id}',${sv},${q.min||0},${q.max||9999},${sv})">+</button></div><span class="num-unit">${q.unit||''}</span>${q.ref?`<span class="num-ref">Réf: ${q.ref}</span>`:''}</div>`;
  }else if(q.type==='s04e'){
    const em=[['😌','Jamais'],['🥱','Légère'],['😪','Modérée'],['💤','Élevée']];
    h+=`<div class="emoji-row">`;
    [0,1,2,3].forEach(vv=>{const sel=v===vv;const sty=sel?`border-color:${color};background:${color};color:#fff`:'';h+=`<button class="emoji-btn${sel?' sel':''}" style="${sty}" onclick="pick('${q.id}',${vv})"><span class="eico">${em[vv][0]}</span><span>${em[vv][1]}</span></button>`;});
    h+=`</div>`;
  }else if(q.type==='s04b'){
    const opts=['Jamais','Parfois','Souvent','Très souvent'];
    h+=`<div class="pill-row">`;
    opts.forEach((opt,i)=>{const sel=v===i;const sty=sel?`border-color:${color};background:${color}1a;color:${color}`:'';h+=`<button class="pill${sel?' sel':''}" style="${sty}" onclick="pick('${q.id}',${i})">${opt}</button>`;});
    h+=`</div>`;
  }else if(q.type==='s03w'){
    const opts=['Jamais','Parfois','Souvent','Très souvent'];
    h+=`<div class="pill-row">`;
    opts.forEach((opt,i)=>{const sel=v===i;const sty=sel?`border-color:${color};background:${color}1a;color:${color}`:'';h+=`<button class="pill${sel?' sel':''}" style="${sty}" onclick="pick('${q.id}',${i})">${opt}</button>`;});
    h+=`</div>`;
  }else if(q.type==='s17'){
    // Arc gauge selector
    h+=arcSelector(q.id,v,1,7,color,['Pas du tout','Tout à fait']);
  }else if(q.type==='s06'){
    // Fill-gauge dots 0-6 that fill progressively
    h+=`<div class="freq-wrap"><div class="freq-dots">`;
    [0,1,2,3,4,5,6].forEach(vv=>{
      const sel=v===vv;

      h+=`<button class="freq-dot${sel?' sel':''}" style="${sty}" onclick="pick('${q.id}',${vv})">${vv}</button>`;
    });
    h+=`</div><div class="freq-lbl"><span>0 — Jamais</span><span>6 — Tous les jours</span></div></div>`;
  }
  h+=`</div>`;
  return h;
}

/* ── ARC GAUGE SELECTOR (fill up to selected) ── */
function arcSelector(id,val,min,max,color,labels){
  const steps=max-min+1;const cx=130,cy=105,R=80,r=48;
  const totalAngle=Math.PI*1.15;const startAngle=-Math.PI/2-totalAngle/2;
  const gap=0.055;let segs='';
  for(let i=0;i<steps;i++){
    const v=min+i;const a1=startAngle+i*(totalAngle/steps)+gap/2;const a2=startAngle+(i+1)*(totalAngle/steps)-gap/2;
    const x1o=cx+R*Math.cos(a1),y1o=cy+R*Math.sin(a1);const x2o=cx+R*Math.cos(a2),y2o=cy+R*Math.sin(a2);
    const x1i=cx+r*Math.cos(a2),y1i=cy+r*Math.sin(a2);const x2i=cx+r*Math.cos(a1),y2i=cy+r*Math.sin(a1);
    const t=(i/(steps-1));
    // Color gradient: green → orange → red
    const rc=Math.round(t<0.5?lerp(34,234,t*2):lerp(234,220,( t-0.5)*2));
    const gc=Math.round(t<0.5?lerp(197,88,t*2):lerp(88,38,(t-0.5)*2));
    const bc=Math.round(t<0.5?lerp(94,36,t*2):lerp(36,38,(t-0.5)*2));
    const segColor=`rgb(${rc},${gc},${bc})`;
    // Fill all segments up to selected value (gauge effect)
    const filled=val!==undefined&&val!==null&&v<=val;
    const fillColor=filled?segColor:'#e5e2db';
    const path=`M${x1o.toFixed(1)},${y1o.toFixed(1)} A${R},${R} 0 0,1 ${x2o.toFixed(1)},${y2o.toFixed(1)} L${x1i.toFixed(1)},${y1i.toFixed(1)} A${r},${r} 0 0,0 ${x2i.toFixed(1)},${y2i.toFixed(1)} Z`;
    const isSelected=val===v;
    segs+=`<path d="${path}" fill="${fillColor}" stroke="${isSelected?segColor:'rgba(255,255,255,0.4)'}" stroke-width="${isSelected?2.5:1}" class="arc-seg" onclick="pick('${id}',${v})" />`;
    const midA=(a1+a2)/2;const lx=cx+(R+16)*Math.cos(midA),ly=cy+(R+16)*Math.sin(midA);
    segs+=`<text x="${lx.toFixed(1)}" y="${ly.toFixed(1)}" text-anchor="middle" dominant-baseline="central" font-size="11" fill="${filled?segColor:'#94a3b8'}" font-weight="${isSelected?'800':'400'}" style="cursor:pointer;user-select:none" onclick="pick('${id}',${v})">${v}</text>`;
  }
  const dispVal=val!==undefined&&val!==null?val:'—';
  const t2=val!==undefined&&val!==null?((val-min)/(max-min)):null;
  const vrc=t2!==null?Math.round(t2<0.5?lerp(34,234,t2*2):lerp(234,220,(t2-0.5)*2)):150;
  const vgc=t2!==null?Math.round(t2<0.5?lerp(197,88,t2*2):lerp(88,38,(t2-0.5)*2)):150;
  const vbc=t2!==null?Math.round(t2<0.5?lerp(94,36,t2*2):lerp(36,38,(t2-0.5)*2)):150;
  const valColor=t2!==null?`rgb(${vrc},${vgc},${vbc})`:'#94a3b8';
  const centerLbl=val!==undefined&&val!==null?(val<=2?'Faible':val<=4?'Modéré':val<=5?'Élevé':'Maximum'):'Touchez';
  return`<div class="arc-wrap">
    <div class="arc-lbl-row"><span>${labels[0]}</span><span>${labels[1]}</span></div>
    <svg class="arc-svg" width="260" height="130" viewBox="0 0 260 130">
      ${segs}
      <text x="${cx}" y="${cy-8}" text-anchor="middle" dominant-baseline="central" font-size="24" font-weight="700" fill="${valColor}" style="font-family:'Fraunces',Georgia,serif">${dispVal}</text>
      <text x="${cx}" y="${cy+13}" text-anchor="middle" font-size="10" fill="#94a3b8">${centerLbl}</text>
    </svg>
  </div>`;
}
function lerp(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));}

/* ── PICK ── */
function pick(id,val){
  sa(id,val);
  const mod=M[ST.mod];
  // Find which step owns this question
  let ownerStep=null;
  for(const st of mod.steps){const q=st.qs.find(x=>x.id===id);if(q){ownerStep=st;break;}}
  if(!ownerStep)return;
  const q=ownerStep.qs.find(x=>x.id===id);
  const saved=window.scrollY;
  const block=document.getElementById('qb-'+id);
  if(block){
    const qIdx=ownerStep.qs.indexOf(q)+1;
    block.outerHTML=renderQ(q,mod.color,mod.cls,qIdx);
    if(q.gate){
      // Re-render the step's sec-body to show/hide gated questions
      const secBody=document.getElementById('sec-body-'+ownerStep.id);
      if(secBody)secBody.innerHTML=ownerStep.qs.map((q2,i)=>renderQ(q2,mod.color,mod.cls,i+1)).join('');
    }
    window.scrollTo(0,saved);
  }
  updateAccordion();
}
function numAdj(id,delta,min,max,step){
  const cur=parseFloat(ST.a[id])||0;const raw=Math.round((cur+delta)/step)*step;
  ST.a[id]=Math.min(max,Math.max(min,parseFloat(raw.toFixed(4))));
  pick(id,ST.a[id]);
}
function numInput(id,val){
  ST.a[id]=val===''?'':parseFloat(val)||val;
  updateAccordion();
}

    const c=it.cls==='good'?'#059669':it.cls==='warn'?'#d97706':it.cls==='bad'?'#dc2626':'#e5e2db';
    const dv=val!==undefined&&val!==null?`${val}/${b.max}`:'—';
    h+=`<div class="nb-row"><div class="nb-ico">${b.ico}</div><div class="nb-label">${b.name}</div><div class="nb-bar-bg"><div class="nb-fill" style="width:${pct}%;background:${c}"></div></div><div class="nb-val" style="color:${c}">${dv}</div></div>`;
  });
  h+=`</div>`;

  // Food categories with stars
  h+=`<div class="nutr-detail-title" style="margin-top:20px">🌟 Catégories alimentaires</div><div class="food-cats">`;
  function stars(pct){
    const n=Math.round(pct/20);
    return[1,2,3,4,5].map(i=>`<span class="star" style="color:${i<=n?'#f59e0b':'#e5e2db'}">${i<=n?'★':'☆'}</span>`).join('');
  }
  const cats=[
    {name:'🥦 Végétaux',tip:'Légumes, fruits, baies, céréales complètes',keys:['vlg','vla','vfr','vba','vce'],hi:true},
    {name:'🐟 Protéines marines',tip:'Poisson gras, fruits de mer',keys:['pg','pa'],hi:true},
    {name:'🫒 Bonnes graisses',tip:"Huile d'olive, noix, oméga-3",keys:['oo','oq','no','li','hc'],hi:true},
    {name:'🥩 Viandes',tip:'Limiter rouge et charcuterie',keys:['vm','ch'],hi:false},
  ];
  cats.forEach(cat=>{
    const vals=cat.keys.map(k=>({v:S.a?S.a[k]:ST.a[k],...interp(k,ST.a[k])}));
    const raw=cat.keys.filter(k=>ST.a[k]!==undefined).map(k=>interpPct(k,ST.a[k]));
    const pct=raw.length?Math.round(raw.reduce((a,b)=>a+b,0)/raw.length):0;
    const adjPct=cat.hi?pct:(100-pct);
    const c=adjPct>=70?'#059669':adjPct>=40?'#d97706':'#dc2626';
    h+=`<div class="food-cat">
      <div class="food-cat-name" style="color:${c}">${cat.name}<div class="food-cat-stars">${stars(adjPct)}</div></div>
      <div class="food-cat-tip">${cat.tip}</div>
    </div>`;
  });
  h+=`</div>`;
  return h;
}

function recoHTML(recos,tab){
  const filtered=tab==='all'?recos:recos.filter(r=>r.cls===tab);
  if(!filtered.length)return`<div style="padding:20px;text-align:center;color:var(--mut);font-size:13px">Aucune recommandation dans cette catégorie.</div>`;
  return filtered.map(r=>{
    const clsLabel=r.cls==='good'?'Force':r.cls==='warn'?'À surveiller':'Priorité';
    return`<div class="reco-item ${r.cls}">
      <div class="reco-left"><span class="reco-emoji">${r.ico}</span><span class="reco-cls ${r.cls}">${clsLabel}</span></div>
      <div class="reco-body">
        <div class="reco-title">${r.title}</div>
        <div class="reco-text">${r.body}</div>
        ${r.actions&&r.actions.length?`<div class="reco-actions">${r.actions.map(a=>`<span class="reco-action">→ ${a}</span>`).join('')}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

function switchTab(tab){
  CURRENT_TAB=tab;
  const tabs=document.querySelectorAll('.reco-tab');
  tabs.forEach(t=>{t.classList.toggle('active',t.textContent.startsWith(tab==='all'?'Tout':tab==='bad'?'🔴':'⚠️')||t.textContent.startsWith(tab==='good'?'✅':''))});
  // More precise tab matching
  tabs.forEach(t=>{
    if(tab==='all')t.classList.toggle('active',t.onclick&&t.onclick.toString().includes("'all'"));
    else t.classList.toggle('active',t.onclick&&t.onclick.toString().includes(`'${tab}'`));
  });
  const list=document.getElementById('reco-list');
  if(list)list.innerHTML=recoHTML(window._RECOS,tab);
}

/* ═══════════ NAV ═══════════ */
function preFillStep(step){
  // Pre-fill gate questions from other modules if already answered
  step.qs.forEach(q=>{
    if(q.preFrom&&ST.a[q.preFrom]!==undefined&&ST.a[q.id]===undefined){
      const mapped=q.preMap[ST.a[q.preFrom]];
      if(mapped!==undefined)ST.a[q.id]=mapped;
    }
  });
  // Auto-skip tabac section if tabac_a===0 (not a smoker from metabolic module)
  // So tf gets pre-filled as 0 = Non-fumeur
}
function startMod(k){ST.mod=k;ST.step=0;ST.view='module';M[k].steps.forEach(st=>preFillStep(st));render();}
function nextStep(){/* deprecated — accordion mode */}
function prevStep(){/* deprecated — accordion mode */}
function finishMod(){
  ST.done[ST.mod]=true;
  // Save state to localStorage for parent to read
  try{localStorage.setItem('previo_profil_state',JSON.stringify({done:ST.done}));}catch(e){}
  // Notify parent iframe
  try{if(window.parent&&window.parent!==window)window.parent.postMessage({type:'previo-module-done',mod:ST.mod},'*');}catch(e){}
  ST.view='results';render();
}
function goLanding(){
  // If inside iframe, tell parent to close module view
  try{
    if(window.parent&&window.parent!==window&&window.parent.closeModule){
      window.parent.closeModule();
      return;
    }
  }catch(e){}
  // Fallback: navigate to app.html
  window.location.href='app.html#profil';
}
function goResults(){ST.view='results';render();}
function resetAll(){if(confirm('Effacer toutes vos réponses et recommencer ?')){ST.a={};ST.done={meta:false,life:false,nutr:false};ST.view='landing';ST.step=0;try{localStorage.setItem('previo_profil_state',JSON.stringify({done:ST.done}));}catch(e){}render();}}

/* ══ AUTO-START MODULE FROM URL ══ */
(function(){
  var params=new URLSearchParams(window.location.search);
  var mod=params.get('mod');
  if(mod && M[mod]){
    startMod(mod);
  } else {
    render();
  }
})();
</script>
