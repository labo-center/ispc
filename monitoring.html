<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
<link rel="manifest" href="/favicons/site.webmanifest">
<meta name="theme-color" content="#0ea5c9">
<title>PRÉVIO — Monitoring</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --c-teal:#0ea5c9;--c-teal-d:#0e7490;--c-teal-glow:rgba(14,165,201,.18);
  --c-violet:#7c3aed;--c-violet-d:#6d28d9;
  --c-green:#10b981;--c-green-d:#047857;
  --c-amber:#f59e0b;--c-amber-d:#d97706;
  --c-red:#ef4444;
  --dark-1:#070c1a;--dark-2:#0f1628;--dark-3:#141c35;--dark-4:#1a2347;
  --dark-b:rgba(255,255,255,.08);--dark-b2:rgba(255,255,255,.13);
  --dark-m:rgba(255,255,255,.42);--dark-t:rgba(255,255,255,.88);
  --bg:#f4f3ef;--card:#fff;--txt:#111827;--mut:#64748b;--brd:#e5e0d8;
  --ff:'DM Sans',system-ui,sans-serif;
  --ffd:'Fraunces',Georgia,serif;
  --nav-h:62px;
  --ease-s:cubic-bezier(.34,1.56,.64,1);
  --ease-o:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:var(--ff);color:var(--txt);overflow-x:hidden;background:var(--bg)}
button,input{font-family:var(--ff);border:none;cursor:pointer;outline:none}
:focus-visible{outline:2px solid var(--c-teal);outline-offset:2px;border-radius:4px}
.fu{animation:fu .5s ease-out both}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
.d4{animation-delay:.2s}.d5{animation-delay:.25s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.38}}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--nav-h);
  background:rgba(7,12,26,.88);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--dark-b)}
.nav-in{max-width:1160px;margin:0 auto;height:100%;display:flex;align-items:center;padding:0 24px}
.nav-logo{display:flex;align-items:center;gap:11px;cursor:pointer;margin-right:38px;flex-shrink:0;text-decoration:none}
.nav-mark{width:36px;height:36px;border-radius:11px;
  background:linear-gradient(135deg,var(--c-teal),var(--c-violet));
  display:grid;place-items:center;
  box-shadow:0 0 22px rgba(14,165,201,.32),0 0 44px rgba(124,58,237,.14)}
.nav-type{font-family:var(--ffd);font-size:19px;font-weight:700;letter-spacing:-.07em;color:#fff;line-height:1}
.nav-type sup{font-size:10px;font-weight:700;letter-spacing:.04em;vertical-align:top;opacity:.5;font-family:var(--ff);text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:2px}
.nl{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;
  color:var(--dark-m);transition:all .15s;cursor:pointer;white-space:nowrap;text-decoration:none}
.nl:hover{color:var(--dark-t);background:rgba(255,255,255,.06)}
.nl.on{color:#fff;background:rgba(255,255,255,.1)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}
.nav-live{display:flex;align-items:center;gap:6px;padding:5px 12px;
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.22);
  border-radius:99px;font-size:11px;font-weight:700;color:var(--c-green)}
.nav-live-dot{width:6px;height:6px;border-radius:50%;background:var(--c-green);
  box-shadow:0 0 8px var(--c-green);animation:pulse 2s infinite}
.nav-user{display:flex;align-items:center;gap:8px;padding:4px 14px 4px 4px;
  background:rgba(255,255,255,.06);border:1px solid var(--dark-b);
  border-radius:99px;cursor:pointer;transition:background .15s;text-decoration:none}
.nav-user:hover{background:rgba(255,255,255,.1)}
.nav-user-av{width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-teal-d),var(--c-violet-d));
  display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff}
.nav-user span{font-size:13px;font-weight:600;color:var(--dark-t)}

/* HERO */
.mon-hero{background:var(--dark-1);padding-top:calc(var(--nav-h) + 48px);padding-bottom:0;position:relative;overflow:hidden}
.mh-b1{position:absolute;top:-100px;right:-80px;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(14,165,201,.11),transparent 65%);pointer-events:none}
.mh-b2{position:absolute;bottom:-80px;left:-60px;width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.11),transparent 65%);pointer-events:none}
.mh-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:36px 36px;pointer-events:none}
.mh-in{max-width:1160px;margin:0 auto;padding:0 24px;position:relative;z-index:1}
.mh-ey{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.mh-ey span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--c-teal)}
.mh-live{display:inline-flex;align-items:center;gap:5px;
  background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);
  border-radius:99px;padding:4px 12px;font-size:10.5px;font-weight:700;color:var(--c-green)}
.mh-live-d{width:6px;height:6px;border-radius:50%;background:var(--c-green);
  box-shadow:0 0 8px var(--c-green);animation:pulse 2s infinite}
.mh-in h1{font-family:var(--ffd);font-size:clamp(24px,3.5vw,38px);font-weight:600;
  letter-spacing:-.055em;color:#fff;margin-bottom:6px}
.mh-in h1 em{font-style:italic;font-weight:300;
  background:linear-gradient(120deg,var(--c-amber),var(--c-teal));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mh-in>p{color:var(--dark-m);font-size:13px;padding-bottom:24px}
.mh-in>p a{color:var(--c-teal);text-decoration:none;font-weight:600;cursor:pointer}
.mh-in>p a:hover{text-decoration:underline}

/* Score strip */
.mon-strip{background:rgba(255,255,255,.034);border-top:1px solid var(--dark-b);
  border-bottom:1px solid rgba(0,0,0,.08);display:flex;overflow-x:auto;scrollbar-width:none;
  max-width:1160px;margin:0 auto}
.mon-strip::-webkit-scrollbar{display:none}
.mss{flex:1;min-width:90px;padding:12px 14px;border-right:1px solid var(--dark-b);text-align:center;
  cursor:pointer;transition:background .15s}
.mss:last-child{border-right:none}
.mss:hover{background:rgba(255,255,255,.04)}
.mss-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--dark-m)}
.mss-val{font-family:var(--ffd);font-size:16px;font-weight:700;color:#fff;margin-top:2px}
.mss-badge{display:inline-block;font-size:8.5px;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:2px}
.msb-g{background:rgba(16,185,129,.18);color:var(--c-green)}
.msb-a{background:rgba(245,158,11,.18);color:var(--c-amber)}

/* BODY */
.mon-body{max-width:1160px;margin:0 auto;padding:24px 24px 80px}

/* Category nav */
.cat-nav{display:flex;gap:7px;margin-bottom:18px;flex-wrap:wrap}
.cat-pill{padding:7px 16px;border-radius:99px;font-size:12px;font-weight:700;
  border:1.5px solid var(--brd);background:var(--card);color:var(--mut);cursor:pointer;transition:all .15s;white-space:nowrap}
.cat-pill:hover{border-color:#94a3b8;color:var(--txt)}
.cat-pill.active{background:var(--dark-3);border-color:rgba(14,165,201,.4);color:#fff}

/* Time filter */
.time-filter{display:flex;gap:4px;margin-bottom:20px}
.tf-btn{padding:5px 13px;border-radius:8px;font-size:11px;font-weight:700;background:transparent;
  color:var(--mut);border:1px solid transparent;cursor:pointer;transition:all .12s}
.tf-btn:hover{color:var(--txt)}
.tf-btn.active{background:var(--dark-3);color:#fff;border-color:var(--dark-b)}

/* Bio cards grid */
.bio-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:700px){.bio-grid{grid-template-columns:1fr}}

.bio-card{background:var(--card);border:1.5px solid var(--brd);border-radius:20px;overflow:hidden;
  transition:transform .25s var(--ease-s),box-shadow .25s}
.bio-card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.08)}
.bc-head{padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.bc-title{font-family:var(--ffd);font-size:14.5px;font-weight:600;letter-spacing:-.025em}
.bc-unit{font-size:10.5px;color:var(--mut);font-weight:600}
.bc-vals{display:flex;align-items:baseline;gap:8px;padding:0 18px}
.bc-current{font-family:var(--ffd);font-size:24px;font-weight:700;letter-spacing:-.04em}
.bc-trend{display:flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700}
.bc-trend.up{color:var(--c-red)}.bc-trend.down{color:var(--c-green)}.bc-trend.stable{color:var(--mut)}
.bc-ref{font-size:10px;color:var(--mut);padding:3px 18px 0}
.bc-chart{padding:6px 10px 10px;height:110px;position:relative}
.bc-chart svg{width:100%;height:100%}
.bc-foot{padding:8px 18px 12px;border-top:1px solid var(--brd);display:flex;gap:12px;flex-wrap:wrap}
.bc-dp{font-size:10px;color:var(--mut)}.bc-dp strong{color:var(--txt);font-weight:700}

/* Compare table */
.compare-card{background:var(--dark-3);border:1px solid var(--dark-b);border-radius:20px;padding:20px;margin-top:22px;position:relative;overflow:hidden}
.compare-card::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:18px 18px;pointer-events:none}
.cmp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;position:relative}
.cmp-title{font-family:var(--ffd);font-size:15px;font-weight:600;color:#fff}
.cmp-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;
  background:rgba(14,165,201,.12);border:1px solid rgba(14,165,201,.25);color:var(--c-teal)}
.cmp-table{width:100%;position:relative;border-collapse:collapse}
.cmp-table th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:var(--dark-m);padding:7px 10px;border-bottom:1px solid var(--dark-b)}
.cmp-table td{font-size:12px;padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);color:rgba(255,255,255,.7)}
.cmp-table tr:last-child td{border-bottom:none}
.cmp-table .val{font-family:var(--ffd);font-weight:700;color:#fff;font-size:13px}
.cmp-table .tu{color:var(--c-red);font-size:10.5px;font-weight:700}
.cmp-table .td{color:var(--c-green);font-size:10.5px;font-weight:700}
.cmp-table .ts{color:var(--dark-m);font-size:10.5px;font-weight:700}
.bsm{display:inline-block;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px}
.bsm-g{background:rgba(16,185,129,.15);color:var(--c-green)}
.bsm-a{background:rgba(245,158,11,.15);color:var(--c-amber)}
.bsm-r{background:rgba(239,68,68,.15);color:var(--c-red)}

/* Export */
.mon-export{display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1.5px solid var(--brd);border-radius:16px;padding:14px 18px;margin-top:22px}
.mon-export-left{display:flex;align-items:center;gap:12px}
.mon-export-btn{padding:9px 20px;border-radius:99px;font-size:12px;font-weight:700;
  background:linear-gradient(135deg,var(--c-teal-d),var(--c-violet-d));color:#fff;transition:transform .18s}
.mon-export-btn:hover{transform:translateY(-2px)}

/* Footer */
.footer{background:var(--dark-1);border-top:1px solid var(--dark-b);padding:28px 24px;text-align:center}
.footer-logo{font-family:var(--ffd);font-size:20px;font-weight:700;letter-spacing:-.07em;color:#fff;margin-bottom:6px}
.footer-logo sup{font-size:9px;font-weight:700;letter-spacing:.04em;vertical-align:top;opacity:.45;font-family:var(--ff);text-transform:uppercase}
.footer-disc{font-size:11px;color:var(--dark-m);line-height:1.8;max-width:560px;margin:0 auto}
.footer-links{margin-top:12px;font-size:11px;display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.footer-links a{color:var(--dark-m);text-decoration:none;transition:color .15s}
.footer-links a:hover{color:var(--c-teal);text-decoration:underline}
.footer-sep{color:rgba(255,255,255,.15)}
/* ── Check-in nav button ── */
.nav-checkin{display:flex;align-items:center;gap:7px;padding:6px 16px;
  background:linear-gradient(135deg,rgba(14,165,201,.15),rgba(124,58,237,.15));
  border:1px solid rgba(14,165,201,.35);border-radius:99px;
  font-size:12px;font-weight:700;color:var(--c-teal);
  cursor:pointer;transition:all .2s;white-space:nowrap}
.nav-checkin:hover{background:linear-gradient(135deg,rgba(14,165,201,.25),rgba(124,58,237,.25));
  border-color:rgba(14,165,201,.5);transform:translateY(-1px)}
.nav-checkin.done{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--c-green)}
.nav-checkin.done .nc-dot{background:var(--c-green);box-shadow:0 0 8px var(--c-green)}
.nc-dot{width:7px;height:7px;border-radius:50%;
  background:var(--c-teal);box-shadow:0 0 8px var(--c-teal);animation:pulse 2s infinite}

@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes panelSlideUp{from{opacity:0;transform:translateY(60px)}to{opacity:1;transform:none}}
@keyframes ciSlideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes checkPop{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes ciscan{0%{top:-2px}100%{top:100%}}

.ci-overlay{position:fixed;inset:0;z-index:900;background:rgba(7,12,26,.65);backdrop-filter:blur(6px);display:none}
.ci-overlay.open{display:block;animation:overlayIn .2s ease-out}
.ci-panel{position:fixed;bottom:0;left:0;right:0;z-index:901;max-height:92vh;max-height:92dvh;
  background:var(--dark-1);border-top-left-radius:28px;border-top-right-radius:28px;
  border:1px solid var(--dark-b);border-bottom:none;overflow:hidden;display:none;
  box-shadow:0 -20px 80px rgba(0,0,0,.6),0 -4px 20px rgba(0,0,0,.3)}
.ci-panel.open{display:flex;flex-direction:column;animation:panelSlideUp .35s cubic-bezier(.16,1,.3,1)}
.ci-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:28px 28px 0 0}
.ci-bg .p-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.026) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);background-size:44px 44px}
.ci-bg .p-blob1{position:absolute;top:-100px;right:-80px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(14,165,201,.1) 0%,transparent 65%)}
.ci-bg .p-blob2{position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.1) 0%,transparent 65%)}
.ci-bg .p-scan{position:absolute;left:0;right:0;height:1px;opacity:.15;background:linear-gradient(90deg,transparent,rgba(14,165,201,.7) 35%,rgba(124,58,237,.7) 65%,transparent);animation:ciscan 9s linear infinite}
.ci-head{padding:14px 20px 12px;position:relative;z-index:2;flex-shrink:0;border-bottom:1px solid var(--dark-b)}
.ci-handle{width:40px;height:4px;border-radius:99px;background:rgba(255,255,255,.15);margin:0 auto 12px}
.ci-head-row{display:flex;align-items:center;justify-content:space-between}
.ci-title{font-family:var(--ffd);font-size:20px;font-weight:600;letter-spacing:-.03em;color:#fff}
.ci-title em{font-style:italic;font-weight:300;background:linear-gradient(120deg,var(--c-teal),var(--c-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ci-close{width:36px;height:36px;border-radius:12px;background:rgba(255,255,255,.06);border:1px solid var(--dark-b);display:grid;place-items:center;color:var(--dark-m);font-size:18px;transition:all .15s;cursor:pointer}
.ci-close:hover{background:rgba(255,255,255,.12);color:#fff}
.ci-date{font-size:11px;font-weight:700;color:var(--dark-m);margin-top:3px}
.ci-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 16px 32px;position:relative;z-index:2}
.ci-menu-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dark-m);margin-bottom:10px;padding-left:2px}
.ci-menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.ci-mi{background:rgba(255,255,255,.035);border:1px solid var(--dark-b);border-radius:18px;padding:16px 8px 14px;text-align:center;cursor:pointer;position:relative;overflow:hidden;transition:transform .22s cubic-bezier(.34,1.56,.64,1),border-color .25s,background .2s}
.ci-mi:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.055)}
.ci-mi:active{transform:scale(.93)}
.ci-mi.done{border-color:rgba(14,165,201,.35);background:rgba(14,165,201,.06)}
.ci-mi.done::after{content:'✓';position:absolute;top:7px;right:9px;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,var(--c-teal),var(--c-green));font-size:10px;font-weight:800;color:#fff;display:grid;place-items:center;animation:checkPop .35s cubic-bezier(.34,1.56,.64,1)}
.mi-ico{font-size:26px;display:block;margin-bottom:5px}
.mi-name{font-size:11px;font-weight:700;color:var(--dark-t);line-height:1.3}
.ci-week-wrap{margin-top:6px;padding-top:16px;border-top:1px solid var(--dark-b)}
.ci-week-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--dark-m);margin-bottom:10px}
.ci-week{display:flex;gap:6px}
.ci-wd{flex:1;text-align:center;padding:8px 4px;border-radius:12px;background:rgba(255,255,255,.025);border:1px solid var(--dark-b);transition:all .15s}
.ci-wd.done{background:rgba(14,165,201,.08);border-color:rgba(14,165,201,.25)}
.ci-wd.today{border-color:rgba(14,165,201,.5)}
.ci-wd-n{font-size:9px;font-weight:700;color:var(--dark-m);text-transform:uppercase}
.ci-wd-d{font-family:var(--ffd);font-size:15px;font-weight:700;color:var(--dark-m);margin-top:1px}
.ci-wd.done .ci-wd-d,.ci-wd.today .ci-wd-d{color:var(--c-teal)}
.ci-wd-dot{width:5px;height:5px;border-radius:50%;margin:4px auto 0}
.ci-wd.done .ci-wd-dot{background:var(--c-teal)}
.ci-input{display:none}
.ci-input.active{display:block;animation:ciSlideUp .3s cubic-bezier(.16,1,.3,1)}
.ci-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:99px;margin-bottom:16px;background:rgba(255,255,255,.06);border:1px solid var(--dark-b);font-size:12px;font-weight:700;color:var(--dark-m);cursor:pointer;transition:all .15s}
.ci-back:hover{background:rgba(255,255,255,.12);color:#fff}
.ci-sig-head{text-align:center;margin-bottom:22px}
.ci-sig-ico{font-size:42px;display:block;margin-bottom:8px}
.ci-sig-title{font-family:var(--ffd);font-size:18px;font-weight:600;color:#fff;letter-spacing:-.02em}
.ci-sig-hint{font-size:12px;color:var(--dark-m);margin-top:4px}
.emo-row{display:flex;gap:0;justify-content:center}
.emo-opt{flex:1;padding:10px 4px;text-align:center;cursor:pointer;border-radius:14px;transition:all .2s}
.emo-opt .ef{font-size:32px;display:block;filter:grayscale(.6) brightness(.7);transition:filter .25s,transform .25s}
.emo-opt .el{font-size:9px;font-weight:700;color:transparent;margin-top:5px;text-transform:uppercase;letter-spacing:.04em;transition:color .2s}
.emo-opt.on .ef{filter:none;transform:scale(1.22)}

<script>
function switchCat(el){document.querySelectorAll('.cat-pill').forEach(function(p){p.classList.remove('active')});el.classList.add('active')}
function switchTf(el){el.parentElement.querySelectorAll('.tf-btn').forEach(function(b){b.classList.remove('active')});el.classList.add('active')}

function drawLine(svgId,data,color,refMin,refMax){
  var svg=document.getElementById(svgId);if(!svg)return;
  var W=400,H=100,pt=12,pb=8;
  var allV=data.map(function(d){return d.v});
  var mn=Math.min.apply(null,allV.concat(refMin!=null?[refMin]:[])) *.92;
  var mx=Math.max.apply(null,allV.concat(refMax!=null?[refMax]:[])) *1.08;
  if(mx===mn){mx+=1;mn-=1}
  function xS(i){return i*(W/Math.max(data.length-1,1))}
  function yS(v){return pt+(1-(v-mn)/(mx-mn))*(H-pt-pb)}
  var h='';
  if(refMin!=null&&refMax!=null){
    var y1=yS(refMax),y2=yS(refMin);
    h+='<rect x="0" y="'+y1.toFixed(1)+'" width="'+W+'" height="'+(y2-y1).toFixed(1)+'" fill="rgba(16,185,129,.06)" rx="3"/>';
    h+='<line x1="0" y1="'+y1.toFixed(1)+'" x2="'+W+'" y2="'+y1.toFixed(1)+'" stroke="rgba(16,185,129,.14)" stroke-width="1" stroke-dasharray="4,4"/>';
    h+='<line x1="0" y1="'+y2.toFixed(1)+'" x2="'+W+'" y2="'+y2.toFixed(1)+'" stroke="rgba(16,185,129,.14)" stroke-width="1" stroke-dasharray="4,4"/>';
  }
  if(data.length>1){
    var ap='M '+data.map(function(d,i){return xS(i).toFixed(1)+','+yS(d.v).toFixed(1)}).join(' L ')+' L '+xS(data.length-1).toFixed(1)+','+(H-pb)+' L '+xS(0).toFixed(1)+','+(H-pb)+' Z';
    h+='<path d="'+ap+'" fill="'+color+'" fill-opacity=".08"/>';
    var lp='M '+data.map(function(d,i){return xS(i).toFixed(1)+','+yS(d.v).toFixed(1)}).join(' L ');
    h+='<path d="'+lp+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  data.forEach(function(d,i){
    var cx=xS(i).toFixed(1),cy=yS(d.v).toFixed(1);
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="'+color+'" stroke="#fff" stroke-width="2"/>';
    h+='<text x="'+cx+'" y="'+(parseFloat(cy)-9).toFixed(1)+'" text-anchor="middle" fill="'+color+'" font-size="10.5" font-weight="700" font-family="DM Sans,sans-serif">'+d.v+'</text>';
  });
  svg.innerHTML=h;
}

function drawAllCharts(){
  drawLine('c-gly',[{v:98},{v:101},{v:103}],'#f59e0b',70,100);
  drawLine('c-hba',[{v:5.6},{v:5.8}],'#f59e0b',4,5.7);
  drawLine('c-crea',[{v:9.2},{v:8.8},{v:9.1}],'#0ea5c9',7,13);
  drawLine('c-asat',[{v:22},{v:25}],'#f59e0b',0,35);
  drawLine('c-crp',[{v:2.5},{v:2.1}],'#10b981',0,1);
  drawLine('c-fer',[{v:84},{v:86}],'#0ea5c9',30,300);
}

// Load user name from localStorage
try{
  var sess=JSON.parse(localStorage.getItem('previo_session')||'{}');
  if(sess&&sess.name){
    var uEl=document.querySelector('.nav-user span');
    var avEl=document.querySelector('.nav-user-av');
    if(uEl)uEl.textContent=sess.name;
    if(avEl)avEl.textContent=sess.name.charAt(0).toUpperCase();
  }
}catch(e){}

requestAnimationFrame(function(){setTimeout(drawAllCharts,120)});
</script>

      <div><div class="ci-title">Check-in <em>matinal</em></div><div class="ci-date" id="ciDt"></div></div>

    </div>
  </div>
  <div class="ci-body" id="ciBd">

      <button class="ci-ok-btn" onclick="ciToMenu()">Ajouter un autre signal →</button>
    </div>
  </div>
</div>

<script>
var CI_SIGS=[
  {id:'poids',icon:'⚖️',name:'Poids',type:'dial',unit:'kg',min:30,max:200,step:0.1,dec:1,def:70},
  {id:'tour',icon:'📏',name:'Tour de taille',type:'dial',unit:'cm',min:50,max:150,step:0.5,dec:1,def:85},
  {id:'urines',icon:'💧',name:'Urines',type:'color',hint:"Indicateur d'hydratation"},
  {id:'sommeil',icon:'🌙',name:'Qualité sommeil',type:'emoji5',faces:['😵','😕','😐','😌','😴'],labels:['Terrible','Mauvais','Moyen','Bon','Excellent']},
  {id:'fatigue',icon:'😴',name:'Fatigue',type:'emoji5',faces:['🔋','🟡','😐','😪','💀'],labels:['Top forme','Correct','Moyen','Fatigué','Épuisé']},
  {id:'stress',icon:'😰',name:'Stress',type:'gauge',min:0,max:10,def:0,

  {id:'digestion',icon:'🌿',name:'Digestion',type:'quick',opts:[{v:'normal',i:'✅',t:'Normal'},{v:'ballonne',i:'🎈',t:'Ballonné'},{v:'douleurs',i:'😣',t:'Douleurs'},{v:'nausee',i:'🤢',t:'Nausée'}]},
  {id:'jeune',icon:'⏱️',name:'Jeûne',type:'yn',yTxt:"Oui, j'ai jeûné",nTxt:'Non'},
  {id:'repas',icon:'🍽️',name:'Repas',type:'repas'},
  {id:'ecran',icon:'📱',name:"Temps d'écran",type:'gauge',min:0,max:12,def:2,
    lvl:[{m:2,l:'Minimal',c:'var(--c-green)'},{m:4,l:'Modéré',c:'var(--c-green)'},{m:6,l:'Élevé',c:'var(--c-teal)'},{m:8,l:'Excessif',c:'var(--c-amber)'},{m:10,l:'Très excessif',c:'var(--c-amber-d)'},{m:12,l:'Addiction',c:'var(--c-red)'}],
    eL:'0h',eR:'12h+'},
  {id:'activite',icon:'🏃',name:'Activité physique',type:'pills',hint:'Sélectionnez une ou plusieurs',
    opts:[{v:'marche',t:'🚶 Marche'},{v:'running',t:'🏃 Running'},{v:'rameur',t:'🚣 Rameur'},{v:'paddle',t:'🏄 Paddle'},{v:'velo',t:'🚴 Vélo'},{v:'muscu',t:'💪 Muscu'},{v:'yoga',t:'🧘 Yoga'},{v:'natation',t:'🏊 Natation'},{v:'autre',t:'⚡ Autre'}]},
  {id:'humeur',icon:'😊',name:'Humeur',type:'emoji5',faces:['😫','😔','😐','🙂','😄'],labels:['Mal','Bof','Neutre','Bien','Top']}
];
var ciTd={},ciT={};
function ciDk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function ciFmtDate(){var d=new Date(),dn=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],mn=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];return dn[d.getDay()]+' '+d.getDate()+' '+mn[d.getMonth()]}
function ciGH(){try{return JSON.parse(localStorage.getItem('previo_checkins')||'{}')}catch(e){return{}}}
function ciSH(h){try{localStorage.setItem('previo_checkins',JSON.stringify(h))}catch(e){}}
function ciLoadTd(){var h=ciGH(),k=ciDk(new Date());ciTd=(h[k]&&h[k].s)?JSON.parse(JSON.stringify(h[k].s)):{}}
function ciSaveSig(id,v){ciTd[id]=v;var h=ciGH(),k=ciDk(new Date());if(!h[k])h[k]={d:k,ts:new Date().toISOString(),s:{}};h[k].s[id]=v;h[k].ts=new Date().toISOString();ciSH(h);ciRenderMenu();ciUpdNav()}
function ciStreak(){var h=ciGH(),s=0,d=new Date();if(!h[ciDk(d)])return 0;s=1;for(var i=1;i<365;i++){d.setDate(d.getDate()-1);if(h[ciDk(d)])s++;else break}return s}
function ciGetLvl(lvls,v){for(var i=0;i<lvls.length;i++){if(v<=lvls[i].m)return lvls[i]}return lvls[lvls.length-1]}
function openCI(){ciLoadTd();ciRenderMenu();ciRenderWeek();document.getElementById('ciOv').classList.add('open');document.getElementById('ciPan').classList.add('open');document.body.style.overflow='hidden';ciShowV('menu')}
function closeCI(){document.getElementById('ciOv').classList.remove('open');document.getElementById('ciPan').classList.remove('open');document.body.style.overflow=''}
function ciShowV(v){document.getElementById('vMenu').style.display=v==='menu'?'block':'none';document.getElementById('vInput').className='ci-input'+(v==='input'?' active':'');document.getElementById('vOk').className='ci-ok'+(v==='ok'?' show':'')}
function ciToMenu(){ciShowV('menu')}
function ciRenderMenu(){var g=document.getElementById('mGrid');g.innerHTML='';CI_SIGS.forEach(function(s){var d=document.createElement('div');d.className='ci-mi'+(ciTd[s.id]!==undefined?' done':'');d.onclick=function(){ciOpenSig(s.id)};d.innerHTML='<span class="mi-ico">'+s.icon+'</span><span class="mi-name">'+s.name+'</span>';g.appendChild(d)})}
function ciRenderWeek(){var c=document.getElementById('wStrip');c.innerHTML='';var t=new Date(),dow=t.getDay(),mon=new Date(t);mon.setDate(t.getDate()-((dow+6)%7));var ns=['L','M','M','J','V','S','D'],h=ciGH();for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);var k=ciDk(d),isT=ciDk(t)===k,dn=!!h[k];var e=document.createElement('div');e.className='ci-wd'+(dn?' done':'')+(isT?' today':'');e.innerHTML='<div class="ci-wd-n">'+ns[i]+'</div><div class="ci-wd-d">'+d.getDate()+'</div><div class="ci-wd-dot"></div>';c.appendChild(e)}}
function ciUpdNav(){var h=ciGH(),k=ciDk(new Date()),b=document.getElementById('navCI');if(!b)return;if(h[k]&&h[k].s&&Object.keys(h[k].s).length>0){b.classList.add('done');b.innerHTML='<span class="nc-dot"></span> Check-in ✓'}}
function ciOpenSig(id){
  var s=CI_SIGS.find(function(x){return x.id===id});if(!s)return;
  var c=document.getElementById('iContent'),cv=ciTd[s.id],h='';ciT={};
  h+='<div class="ci-sig-head"><span class="ci-sig-ico">'+s.icon+'</span><div class="ci-sig-title">'+s.name+'</div>';
  if(s.hint)h+='<div class="ci-sig-hint">'+s.hint+'</div>';h+='</div>';
  switch(s.type){
    case 'emoji5':
      h+='<div class="emo-row">';for(var i=0;i<5;i++){var sel=cv===(i+1)?' on':'';h+='<div class="emo-opt'+sel+'" data-v="'+(i+1)+'" onclick="ciPEmo(this,\''+id+'\')"><span class="ef">'+s.faces[i]+'</span><span class="el">'+s.labels[i]+'</span></div>'}h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="ciCfmEmo(\''+id+'\')" '+(cv?'':'disabled')+'>Valider →</button>';break;
    case 'gauge':
      var gv=cv!==undefined?cv:s.def,gi=ciGetLvl(s.lvl,gv);
      h+='<div class="gau"><div class="gau-v" id="gV" style="color:'+gi.c+'">'+gv+'</div><div class="gau-l" id="gL" style="color:'+gi.c+'">'+gi.l+'</div>';
      h+='<input type="range" class="gau-r" id="gR" min="'+s.min+'" max="'+s.max+'" value="'+gv+'" step="1" oninput="ciUGau(this.value,\''+id+'\')">';
      h+='<div class="gau-ends"><span class="gau-end">'+s.eL+'</span><span class="gau-end">'+s.eR+'</span></div></div>';
      h+='<button class="ci-confirm" onclick="ciCfmGau(\''+id+'\')">Valider →</button>';break;
    case 'dial':
      var dv=cv!==undefined?cv:s.def;ciT._sv=dv;
      h+='<div class="rdial-wrap"><div class="rdial-display"><div class="rdial-v" id="stV">'+dv.toFixed(s.dec)+'</div><div class="rdial-u">'+s.unit+'</div></div>';
      h+='<div class="rdial-canvas-wrap" id="dialWrap_'+id+'"><svg class="rdial-svg" viewBox="0 0 200 200" id="dialSvg_'+id+'">';
      h+='<defs><linearGradient id="dialGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="var(--c-teal)"/><stop offset="100%" stop-color="var(--c-violet)"/></linearGradient></defs>';
      h+='<circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="16"/>';
      h+='<circle cx="100" cy="100" r="80" fill="none" stroke="url(#dialGrad)" stroke-width="16" stroke-linecap="round" stroke-dasharray="502" stroke-dashoffset="502" id="dialArc_'+id+'" style="transform:rotate(-90deg);transform-origin:100px 100px;transition:stroke-dashoffset .1s"/>';
      h+='<circle cx="100" cy="100" r="54" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>';
      h+='<text x="100" y="93" text-anchor="middle" fill="rgba(255,255,255,.35)" font-size="11" font-family="inherit" font-weight="700" letter-spacing="1">GLISSER</text>';
      h+='<text x="100" y="112" text-anchor="middle" fill="rgba(255,255,255,.2)" font-size="10" font-family="inherit">↕ pour ajuster</text>';
      h+='</svg></div>';
      h+='<div class="rdial-fine"><button class="rdial-fine-btn" onclick="ciDialFine(\''+id+'\',-1)">−</button><span class="rdial-fine-label">Précision ±'+s.step+' '+s.unit+'</span><button class="rdial-fine-btn" onclick="ciDialFine(\''+id+'\',1)">+</button></div></div>';
      h+='<button class="ci-confirm" onclick="ciCfmDial(\''+id+'\')">Valider →</button>';break;
    case 'repas':
      var rv=cv||{};
      h+='<div class="repas-wrap"><div class="repas-meal"><div class="repas-meal-title">☀️ Déjeuner</div><div class="repas-opts">';
      h+='<div class="repas-opt'+(rv.dej==='riche'?' on':'')+'" onclick="ciPRepas(this,\'dej\',\'riche\')"><span class="ro-i">🍖</span><span class="ro-t">Riche</span></div>';
      h+='<div class="repas-opt'+(rv.dej==='normal'?' on':'')+'" onclick="ciPRepas(this,\'dej\',\'normal\')"><span class="ro-i">🥗</span><span class="ro-t">Normal</span></div>';
      h+='<div class="repas-opt'+(rv.dej==='saute'?' on':'')+'" onclick="ciPRepas(this,\'dej\',\'saute\')"><span class="ro-i">⏭️</span><span class="ro-t">Sauté</span></div>';
      h+='</div></div><div class="repas-meal"><div class="repas-meal-title">🌙 Dîner</div><div class="repas-opts">';
      h+='<div class="repas-opt'+(rv.din==='riche'?' on':'')+'" onclick="ciPRepas(this,\'din\',\'riche\')"><span class="ro-i">🍖</span><span class="ro-t">Riche</span></div>';
      h+='<div class="repas-opt'+(rv.din==='normal'?' on':'')+'" onclick="ciPRepas(this,\'din\',\'normal\')"><span class="ro-i">🥗</span><span class="ro-t">Normal</span></div>';
      h+='<div class="repas-opt'+(rv.din==='saute'?' on':'')+'" onclick="ciPRepas(this,\'din\',\'saute\')"><span class="ro-i">⏭️</span><span class="ro-t">Sauté</span></div>';
      h+='</div></div></div>';
      h+='<button class="ci-confirm" id="cfm" onclick="ciCfmRepas()" '+(rv.dej||rv.din?'':'disabled')+'>Valider →</button>';break;
    case 'color':
      var cls=[{bg:'#f5f0d0',l:'Transparent'},{bg:'#f0e68c',l:'Jaune clair'},{bg:'#daa520',l:'Jaune'},{bg:'#cd853f',l:'Jaune foncé'},{bg:'#a0522d',l:'Ambre'},{bg:'#8b4513',l:'Brun'}];
      h+='<div class="clr-strip">';for(var j=0;j<cls.length;j++){var cs=cv===(j+1)?' on':'';h+='<div class="clr-opt'+cs+'" style="background:'+cls[j].bg+'" data-v="'+(j+1)+'" onclick="ciPClr(this,\''+id+'\')" title="'+cls[j].l+'"></div>'}h+='</div>';
      h+='<div style="display:flex;justify-content:space-between;padding:6px 4px 0"><span style="font-size:10px;font-weight:600;color:var(--c-green)">Bien hydraté</span><span style="font-size:10px;font-weight:600;color:var(--c-amber)">Déshydraté</span></div>';
      h+='<button class="ci-confirm" id="cfm" onclick="ciCfmClr(\''+id+'\')" '+(cv?'':'disabled')+'>Valider →</button>';break;
    case 'quick':
      h+='<div class="qk-row">';s.opts.forEach(function(o){var qs=cv===o.v?' on':'';h+='<div class="qk-opt'+qs+'" data-v="'+o.v+'" onclick="ciPQk(this,\''+id+'\')"><span class="qi">'+o.i+'</span><span class="qt">'+o.t+'</span></div>'});h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="ciCfmQk(\''+id+'\')" '+(cv?'':'disabled')+'>Valider →</button>';break;
    case 'yn':
      h+='<div class="yn"><div class="yn-b'+(cv===true?' on':'')+'" data-v="true" onclick="ciPYn(this,\''+id+'\')"><span class="yi">✅</span><span class="yt">'+s.yTxt+'</span></div><div class="yn-b'+(cv===false?' on':'')+'" data-v="false" onclick="ciPYn(this,\''+id+'\')"><span class="yi">❌</span><span class="yt">'+s.nTxt+'</span></div></div>';
      h+='<button class="ci-confirm" id="cfm" onclick="ciCfmYn(\''+id+'\')" '+(cv!==undefined?'':'disabled')+'>Valider →</button>';break;
    case 'pills':
      var ca=Array.isArray(cv)?cv:[];h+='<div class="pll-row">';s.opts.forEach(function(o){var ps=ca.indexOf(o.v)>-1?' on':'';h+='<div class="pll'+ps+'" data-v="'+o.v+'" onclick="ciPPll(this)">'+o.t+'</div>'});h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="ciCfmPll(\''+id+'\')" '+(ca.length?'':'disabled')+'>Valider →</button>';break;
  }
  c.innerHTML=h;ciShowV('input');document.getElementById('ciBd').scrollTop=0;
  if(s.type==='dial')setTimeout(function(){ciDialInit(id);},0);
  if(s.type==='repas'){ciT._repas=cv?JSON.parse(JSON.stringify(cv)):{};}}
function ciVib(){if(navigator.vibrate)navigator.vibrate(12)}
function ciEnCfm(){var b=document.getElementById('cfm');if(b)b.disabled=false}
function ciPEmo(el,id){el.parentElement.querySelectorAll('.emo-opt').forEach(function(o){o.classList.remove('on')});el.classList.add('on');ciT[id]=parseInt(el.dataset.v);ciEnCfm();ciVib()}
function ciCfmEmo(id){if(ciT[id]){ciSaveSig(id,ciT[id]);ciShowOk(id)}}
function ciUGau(v,id){v=parseInt(v);var s=CI_SIGS.find(function(x){return x.id===id}),i=ciGetLvl(s.lvl,v);document.getElementById('gV').textContent=v;document.getElementById('gV').style.color=i.c;document.getElementById('gL').textContent=i.l;document.getElementById('gL').style.color=i.c;ciT[id]=v}
function ciCfmGau(id){var v=parseInt(document.getElementById('gR').value);ciSaveSig(id,v);ciShowOk(id)}
function ciDialInit(id){var s=CI_SIGS.find(function(x){return x.id===id});var wrap=document.getElementById('dialWrap_'+id);if(!wrap)return;var startY=null,startV=null,range=s.max-s.min;function updDial(v){ciT._sv=v;document.getElementById('stV').textContent=v.toFixed(s.dec);var arc=document.getElementById('dialArc_'+id);if(!arc)return;var pct=(v-s.min)/range;arc.style.strokeDashoffset=(502-(502*Math.min(pct,1))).toFixed(1);ciVib();}function onStart(e){e.preventDefault();startY=(e.touches?e.touches[0].clientY:e.clientY);startV=ciT._sv!==undefined?ciT._sv:(ciTd[id]!==undefined?ciTd[id]:s.def);}function onMove(e){if(startY===null)return;e.preventDefault();var cy=(e.touches?e.touches[0].clientY:e.clientY);var dy=startY-cy;var nv=startV+dy*(range/200);nv=Math.max(s.min,Math.min(s.max,nv));nv=Math.round(nv/s.step)*s.step;nv=Math.round(nv*100)/100;updDial(nv);}function onEnd(){startY=null;}wrap.addEventListener('mousedown',onStart);wrap.addEventListener('mousemove',onMove);wrap.addEventListener('mouseup',onEnd);wrap.addEventListener('mouseleave',onEnd);wrap.addEventListener('touchstart',onStart,{passive:false});wrap.addEventListener('touchmove',onMove,{passive:false});wrap.addEventListener('touchend',onEnd);var iv=ciT._sv!==undefined?ciT._sv:(ciTd[id]!==undefined?ciTd[id]:s.def);var arc=document.getElementById('dialArc_'+id);if(arc){var pct=(iv-s.min)/range;arc.style.strokeDashoffset=(502-(502*Math.min(pct,1))).toFixed(1);}}
function ciDialFine(id,dir){var s=CI_SIGS.find(function(x){return x.id===id});var cur=ciT._sv!==undefined?ciT._sv:(ciTd[id]!==undefined?ciTd[id]:s.def);cur+=dir*s.step;cur=Math.max(s.min,Math.min(s.max,cur));cur=Math.round(cur*100)/100;ciT._sv=cur;document.getElementById('stV').textContent=cur.toFixed(s.dec);var arc=document.getElementById('dialArc_'+id);if(arc){var range=s.max-s.min,pct=(cur-s.min)/range;arc.style.strokeDashoffset=(502-(502*Math.min(pct,1))).toFixed(1);}ciVib();}
function ciCfmDial(id){var s=CI_SIGS.find(function(x){return x.id===id});var v=ciT._sv!==undefined?ciT._sv:(ciTd[id]!==undefined?ciTd[id]:s.def);ciSaveSig(id,v);ciShowOk(id);}
function ciPRepas(el,meal,val){el.parentElement.querySelectorAll('.repas-opt').forEach(function(o){o.classList.remove('on')});el.classList.add('on');if(!ciT._repas)ciT._repas={};ciT._repas[meal]=val;var b=document.getElementById('cfm');if(b)b.disabled=false;ciVib();}
function ciCfmRepas(){var v=ciT._repas||{};ciSaveSig('repas',v);ciShowOk('repas');}
function ciPClr(el,id){el.parentElement.querySelectorAll('.clr-opt').forEach(function(o){o.classList.remove('on')});el.classList.add('on');ciT[id]=parseInt(el.dataset.v);ciEnCfm();ciVib()}
function ciCfmClr(id){if(ciT[id]){ciSaveSig(id,ciT[id]);ciShowOk(id)}}
function ciPQk(el,id){el.parentElement.querySelectorAll('.qk-opt').forEach(function(o){o.classList.remove('on')});el.classList.add('on');ciT[id]=el.dataset.v;ciEnCfm();ciVib()}
function ciCfmQk(id){if(ciT[id]){ciSaveSig(id,ciT[id]);ciShowOk(id)}}
function ciPYn(el,id){el.parentElement.querySelectorAll('.yn-b').forEach(function(o){o.classList.remove('on')});el.classList.add('on');ciT[id]=el.dataset.v==='true';ciEnCfm();ciVib()}
function ciCfmYn(id){if(ciT[id]!==undefined){ciSaveSig(id,ciT[id]);ciShowOk(id)}}
function ciPPll(el){el.classList.toggle('on');var sel=[];el.parentElement.querySelectorAll('.pll.on').forEach(function(p){sel.push(p.dataset.v)});var b=document.getElementById('cfm');if(b)b.disabled=sel.length===0;ciT._pl=sel;ciVib()}
function ciCfmPll(id){var s=ciT._pl||[];if(s.length>0){ciSaveSig(id,s);ciShowOk(id)}}
function ciShowOk(id){var s=CI_SIGS.find(function(x){return x.id===id});document.getElementById('okMsg').textContent=s.icon+' '+s.name+' enregistré';var st=ciStreak();document.getElementById('okStreak').textContent='🔥 '+st+' jour'+(st>1?'s':'')+' consécutif'+(st>1?'s':'');ciShowV('ok');if(navigator.vibrate)navigator.vibrate([15,40,15]);ciRenderWeek()}
(function(){document.getElementById('ciDt').textContent=ciFmtDate();ciUpdNav();})();
document.addEventListener('keydown',function(e){if(e.key==='Escape'&&document.getElementById('ciPan').classList.contains('open'))closeCI();});
</script>
