<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg">
<link rel="icon" type="image/x-icon" href="/favicons/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png">
<link rel="manifest" href="/favicons/site.webmanifest">
<meta name="theme-color" content="#070c1a">
<title>Profilys — Check-in Quotidien</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   Profilys — DESIGN SYSTEM (exact match)
══════════════════════════════════════════ */
:root{
  --c-teal:#0ea5c9;--c-teal-d:#0e7490;--c-teal-glow:rgba(14,165,201,.18);
  --c-violet:#7c3aed;--c-violet-d:#6d28d9;
  --c-green:#10b981;--c-green-d:#047857;--c-green-glow:rgba(16,185,129,.18);
  --c-amber:#f59e0b;--c-amber-d:#d97706;
  --c-red:#ef4444;
  --dark-1:#070c1a;--dark-2:#0f1628;--dark-3:#141c35;--dark-4:#1a2347;
  --dark-b:rgba(255,255,255,.08);--dark-b2:rgba(255,255,255,.13);
  --dark-m:rgba(255,255,255,.42);--dark-t:rgba(255,255,255,.88);
  --ff:'DM Sans',system-ui,sans-serif;
  --ffd:'Fraunces',Georgia,serif;
  --nav-h:62px;
  --ease-s:cubic-bezier(.34,1.56,.64,1);
  --ease-o:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;min-height:100dvh}
body{font-family:var(--ff);background:var(--dark-1);color:#fff;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent}
button,input,textarea{font-family:var(--ff);border:none;cursor:pointer;outline:none;
  -webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid var(--c-teal);outline-offset:2px;border-radius:4px}

/* ── Animations ── */
.fu{animation:fu .5s ease-out both}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}
.d4{animation-delay:.24s}.d5{animation-delay:.3s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.38}}
@keyframes scan{0%{top:-2px}100%{top:100%}}
@keyframes checkPop{0%{transform:scale(.5);opacity:0}50%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes panelSlideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:none}}

/* ════════════════════════════════════════
   NAV — Check-in replaces "Données locales"
════════════════════════════════════════ */
.nav{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--nav-h);
  background:rgba(7,12,26,.85);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid var(--dark-b)}
.nav-in{max-width:1160px;margin:0 auto;height:100%;display:flex;align-items:center;padding:0 24px;gap:0}
.nav-logo{display:flex;align-items:center;gap:11px;cursor:pointer;margin-right:38px;flex-shrink:0;text-decoration:none}
.nav-mark{width:36px;height:36px;border-radius:11px;
  background:linear-gradient(135deg,var(--c-teal),var(--c-violet));
  display:grid;place-items:center;
  box-shadow:0 0 22px rgba(14,165,201,.32),0 0 44px rgba(124,58,237,.14);flex-shrink:0}
.nav-type{font-family:var(--ffd);font-size:19px;font-weight:700;letter-spacing:-.07em;color:#fff;line-height:1}
.nav-type sup{font-size:10px;font-weight:700;letter-spacing:.04em;vertical-align:top;margin-top:3px;opacity:.5;font-family:var(--ff);text-transform:uppercase}
.nav-links{display:flex;align-items:center;gap:2px}
.nl{padding:7px 14px;border-radius:9px;font-size:13px;font-weight:600;
  color:var(--dark-m);transition:all .15s;cursor:pointer;white-space:nowrap;text-decoration:none}
.nl:hover{color:var(--dark-t);background:rgba(255,255,255,.06)}
.nl.on{color:#fff;background:rgba(255,255,255,.1)}
.nav-r{margin-left:auto;display:flex;align-items:center;gap:10px}

/* ── Check-in nav button ── */
.nav-checkin{
  display:flex;align-items:center;gap:7px;padding:6px 16px;
  background:linear-gradient(135deg,rgba(14,165,201,.15),rgba(124,58,237,.15));
  border:1px solid rgba(14,165,201,.35);
  border-radius:99px;font-size:12px;font-weight:700;color:var(--c-teal);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.nav-checkin:hover{background:linear-gradient(135deg,rgba(14,165,201,.25),rgba(124,58,237,.25));
  border-color:rgba(14,165,201,.5);transform:translateY(-1px)}
.nav-checkin .nc-dot{width:7px;height:7px;border-radius:50%;
  background:var(--c-teal);box-shadow:0 0 8px var(--c-teal);animation:pulse 2s infinite}
.nav-checkin.done{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--c-green)}
.nav-checkin.done .nc-dot{background:var(--c-green);box-shadow:0 0 8px var(--c-green)}

.nav-user{display:flex;align-items:center;gap:8px;padding:4px 14px 4px 4px;
  background:rgba(255,255,255,.06);border:1px solid var(--dark-b);
  border-radius:99px;cursor:pointer;transition:background .15s;text-decoration:none}
.nav-user:hover{background:rgba(255,255,255,.1)}
.nav-user-av{width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-teal-d),var(--c-violet-d));
  display:grid;place-items:center;font-size:13px;font-weight:700;color:#fff}
.nav-user span{font-size:13px;font-weight:600;color:var(--dark-t)}
@media(max-width:768px){.nav-links{display:none}}

/* ════════════════════════════════════════
   MAIN PAGE (placeholder with exact BG)
════════════════════════════════════════ */
.page-wrap{min-height:100vh;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center}
/* Blobs — exact hero match */
.bg-b1{position:absolute;top:-160px;left:-140px;width:680px;height:680px;border-radius:50%;
  background:radial-gradient(circle,rgba(14,165,201,.13) 0%,transparent 65%);pointer-events:none}
.bg-b2{position:absolute;bottom:-140px;right:-120px;width:560px;height:560px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.15) 0%,transparent 65%);pointer-events:none}
.bg-b3{position:absolute;top:50%;left:54%;width:380px;height:380px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.07) 0%,transparent 60%);
  pointer-events:none;transform:translate(-50%,-50%)}
/* Grid lines — exact */
.bg-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.026) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none}
/* Scan line — exact */
.bg-scan{position:absolute;left:0;right:0;height:1px;pointer-events:none;opacity:.22;
  background:linear-gradient(90deg,transparent,rgba(14,165,201,.7) 35%,rgba(124,58,237,.7) 65%,transparent);
  animation:scan 9s linear infinite}

.page-content{position:relative;z-index:2;text-align:center;padding:24px}
.page-content h1{font-family:var(--ffd);font-size:clamp(28px,5vw,48px);font-weight:700;
  letter-spacing:-.055em;color:#fff;margin-bottom:10px}
.page-content h1 em{font-style:italic;font-weight:300;
  background:linear-gradient(115deg,#22d3ee 0%,#a78bfa 55%,#4ade80 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-content p{font-size:14px;color:var(--dark-m);margin-bottom:28px}
.cta-main{display:inline-flex;align-items:center;gap:9px;
  padding:16px 34px;border-radius:99px;font-weight:700;font-size:15px;
  background:linear-gradient(135deg,var(--c-teal-d),var(--c-violet-d));color:#fff;
  box-shadow:0 8px 32px rgba(14,116,144,.42);transition:transform .22s var(--ease-s)}
.cta-main:hover{transform:translateY(-3px) scale(1.02)}

/* ════════════════════════════════════════
   CHECK-IN OVERLAY + BOTTOM SHEET
════════════════════════════════════════ */
.ci-overlay{position:fixed;inset:0;z-index:900;
  background:rgba(7,12,26,.6);backdrop-filter:blur(6px);display:none}
.ci-overlay.open{display:block;animation:overlayIn .2s ease-out}

.ci-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:901;
  max-height:92vh;max-height:92dvh;
  background:var(--dark-1);
  border-top-left-radius:28px;border-top-right-radius:28px;
  border:1px solid var(--dark-b);border-bottom:none;
  overflow:hidden;display:none;
  box-shadow:0 -20px 80px rgba(0,0,0,.6),0 -4px 20px rgba(0,0,0,.3);
}
.ci-panel.open{display:flex;flex-direction:column;animation:panelSlideUp .35s var(--ease-o)}

/* ── Panel background textures (same grid+blobs+scan) ── */
.ci-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;border-radius:28px 28px 0 0}
.ci-bg .p-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.026) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.026) 1px,transparent 1px);
  background-size:44px 44px}
.ci-bg .p-blob1{position:absolute;top:-100px;right:-80px;width:350px;height:350px;border-radius:50%;
  background:radial-gradient(circle,rgba(14,165,201,.1) 0%,transparent 65%)}
.ci-bg .p-blob2{position:absolute;bottom:-60px;left:-60px;width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(124,58,237,.1) 0%,transparent 65%)}
.ci-bg .p-scan{position:absolute;left:0;right:0;height:1px;opacity:.15;
  background:linear-gradient(90deg,transparent,rgba(14,165,201,.7) 35%,rgba(124,58,237,.7) 65%,transparent);
  animation:scan 9s linear infinite}

/* ── Panel header ── */
.ci-head{padding:14px 20px 12px;position:relative;z-index:2;flex-shrink:0;
  border-bottom:1px solid var(--dark-b)}
.ci-handle{width:40px;height:4px;border-radius:99px;background:rgba(255,255,255,.15);margin:0 auto 12px}
.ci-head-row{display:flex;align-items:center;justify-content:space-between}
.ci-title{font-family:var(--ffd);font-size:20px;font-weight:600;letter-spacing:-.03em;color:#fff}
.ci-title em{font-style:italic;font-weight:300;
  background:linear-gradient(120deg,var(--c-teal),var(--c-violet));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ci-close{width:36px;height:36px;border-radius:12px;
  background:rgba(255,255,255,.06);border:1px solid var(--dark-b);
  display:grid;place-items:center;color:var(--dark-m);font-size:18px;transition:all .15s}
.ci-close:hover{background:rgba(255,255,255,.12);color:#fff}
.ci-date{font-size:11px;font-weight:700;color:var(--dark-m);margin-top:3px}

/* ── Scrollable body ── */
.ci-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:18px 16px 32px;position:relative;z-index:2}

/* ════════════════════════════════════════
   MENU GRID — Signal picker
════════════════════════════════════════ */
.ci-menu-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--dark-m);margin-bottom:10px;padding-left:2px}
.ci-menu-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
@media(max-width:380px){.ci-menu-grid{grid-template-columns:repeat(2,1fr)}}

.ci-mi{
  background:rgba(255,255,255,.035);border:1px solid var(--dark-b);
  border-radius:18px;padding:16px 8px 14px;text-align:center;
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .22s var(--ease-s),border-color .25s,background .2s;
}
/* Micro grid inside cards — same pattern */
.ci-mi::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);
  background-size:16px 16px;pointer-events:none}
.ci-mi:active{transform:scale(.93)}
.ci-mi:hover{border-color:rgba(255,255,255,.15);background:rgba(255,255,255,.055)}
.ci-mi.done{border-color:rgba(14,165,201,.35);background:rgba(14,165,201,.06)}
.ci-mi.done::after{
  content:'✓';position:absolute;top:7px;right:9px;
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-teal),var(--c-green));
  font-size:10px;font-weight:800;color:#fff;
  display:grid;place-items:center;animation:checkPop .35s var(--ease-s)}
.mi-ico{font-size:26px;display:block;margin-bottom:5px;position:relative}
.mi-name{font-size:11px;font-weight:700;color:var(--dark-t);position:relative;line-height:1.3}

/* ── Week strip ── */
.ci-week-wrap{margin-top:6px;padding-top:16px;border-top:1px solid var(--dark-b)}
.ci-week-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--dark-m);margin-bottom:10px}
.ci-week{display:flex;gap:6px}
.ci-wd{flex:1;text-align:center;padding:8px 4px;border-radius:12px;
  background:rgba(255,255,255,.025);border:1px solid var(--dark-b);transition:all .15s}
.ci-wd.done{background:rgba(14,165,201,.08);border-color:rgba(14,165,201,.25)}
.ci-wd.today{border-color:rgba(14,165,201,.5)}
.ci-wd-n{font-size:9px;font-weight:700;color:var(--dark-m);text-transform:uppercase}
.ci-wd-d{font-family:var(--ffd);font-size:15px;font-weight:700;color:var(--dark-m);margin-top:1px}
.ci-wd.done .ci-wd-d{color:#fff}
.ci-wd.today .ci-wd-d{color:var(--c-teal)}
.ci-wd-dot{width:5px;height:5px;border-radius:50%;margin:4px auto 0;background:transparent}
.ci-wd.done .ci-wd-dot{background:var(--c-teal)}

/* ════════════════════════════════════════
   INPUT VIEW — Dynamic form per signal
════════════════════════════════════════ */
.ci-input{display:none}
.ci-input.active{display:block;animation:slideUp .3s var(--ease-o)}

.ci-back{display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:99px;margin-bottom:16px;
  background:rgba(255,255,255,.06);border:1px solid var(--dark-b);
  font-size:12px;font-weight:700;color:var(--dark-m);cursor:pointer;transition:all .15s}
.ci-back:hover{background:rgba(255,255,255,.12);color:#fff}

.ci-sig-head{text-align:center;margin-bottom:22px}
.ci-sig-ico{font-size:42px;display:block;margin-bottom:8px}
.ci-sig-title{font-family:var(--ffd);font-size:18px;font-weight:600;color:#fff;letter-spacing:-.02em}
.ci-sig-hint{font-size:12px;color:var(--dark-m);margin-top:4px}

/* ─── Emoji scale ─── */
.emo-row{display:flex;gap:0;justify-content:center}
.emo-opt{flex:1;padding:10px 4px;text-align:center;cursor:pointer;border-radius:14px;
  transition:all .2s var(--ease-s)}
.emo-opt:active{transform:scale(.88)}
.emo-opt .ef{font-size:32px;display:block;
  filter:grayscale(.6) brightness(.7);transition:filter .25s,transform .25s var(--ease-s)}
.emo-opt .el{font-size:9px;font-weight:700;color:transparent;margin-top:5px;
  text-transform:uppercase;letter-spacing:.04em;transition:color .2s}
.emo-opt.on .ef{filter:none;transform:scale(1.22)}
.emo-opt.on .el{color:var(--dark-t)}
.emo-opt.on{background:rgba(255,255,255,.05)}

/* ─── Quick select ─── */
.qk-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.qk-opt{padding:16px 10px;border-radius:16px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--dark-b);
  text-align:center;cursor:pointer;transition:all .2s var(--ease-s)}
.qk-opt:active{transform:scale(.94)}
.qk-opt .qi{font-size:24px;display:block;margin-bottom:4px}
.qk-opt .qt{font-size:11px;font-weight:700;color:var(--dark-m);transition:color .2s}
.qk-opt.on{background:rgba(14,165,201,.1);border-color:rgba(14,165,201,.4)}
.qk-opt.on .qt{color:#fff}

/* ─── Color picker ─── */
.clr-strip{display:flex;gap:8px;justify-content:center;padding:8px 0}
.clr-opt{width:46px;height:46px;border-radius:13px;border:3px solid transparent;
  cursor:pointer;transition:transform .2s var(--ease-s),border-color .2s;display:grid;place-items:center}
.clr-opt:active{transform:scale(.9)}
.clr-opt.on{border-color:#fff;transform:scale(1.1)}
.clr-opt.on::after{content:'✓';font-size:16px;font-weight:800;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5)}

/* ─── Stepper ─── */
.stp{display:flex;align-items:center;justify-content:center;gap:24px;padding:10px 0}
.stp-btn{width:56px;height:56px;border-radius:16px;
  background:rgba(255,255,255,.06);border:1.5px solid var(--dark-b);
  font-size:26px;font-weight:300;color:var(--dark-t);display:grid;place-items:center;
  transition:all .15s var(--ease-s)}
.stp-btn:active{transform:scale(.88);background:rgba(14,165,201,.15);border-color:rgba(14,165,201,.4)}
.stp-v{font-family:var(--ffd);font-size:42px;font-weight:700;color:#fff;min-width:80px;text-align:center}
.stp-u{font-size:12px;font-weight:600;color:var(--dark-m);text-align:center;margin-top:2px}

/* ─── Gauge ─── */
.gau{padding:8px 0}
.gau-v{font-family:var(--ffd);font-size:28px;font-weight:700;color:#fff;text-align:center;
  margin-bottom:2px;transition:color .3s}
.gau-l{font-size:11px;font-weight:700;text-align:center;margin-bottom:12px;
  text-transform:uppercase;letter-spacing:.06em;transition:color .3s}
.gau-r{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:99px;
  background:rgba(255,255,255,.08);outline:none}
.gau-r::-webkit-slider-thumb{-webkit-appearance:none;width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-teal),var(--c-violet));
  box-shadow:0 0 16px rgba(14,165,201,.4),0 4px 12px rgba(0,0,0,.3);cursor:pointer;
  transition:transform .15s var(--ease-s)}
.gau-r::-webkit-slider-thumb:active{transform:scale(1.18);
  box-shadow:0 0 28px rgba(14,165,201,.6),0 6px 20px rgba(0,0,0,.4)}
.gau-r::-moz-range-thumb{width:40px;height:40px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--c-teal),var(--c-violet));
  box-shadow:0 0 16px rgba(14,165,201,.4),0 4px 12px rgba(0,0,0,.3);cursor:pointer}
.gau-ends{display:flex;justify-content:space-between;margin-top:10px}
.gau-end{font-size:11px;color:var(--dark-m);font-weight:600}

/* ─── Toggle pills ─── */
.pll-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
.pll{padding:11px 18px;border-radius:99px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--dark-b);
  font-size:12.5px;font-weight:600;color:var(--dark-m);
  cursor:pointer;transition:all .2s var(--ease-s);white-space:nowrap}
.pll:active{transform:scale(.94)}
.pll.on{background:rgba(14,165,201,.12);border-color:rgba(14,165,201,.4);color:#fff}

/* ─── Yes/No ─── */
.yn{display:flex;gap:10px;max-width:320px;margin:0 auto}
.yn-b{flex:1;padding:20px 16px;border-radius:18px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--dark-b);
  text-align:center;cursor:pointer;transition:all .2s var(--ease-s)}
.yn-b:active{transform:scale(.94)}
.yn-b .yi{font-size:28px;display:block;margin-bottom:4px}
.yn-b .yt{font-size:13px;font-weight:700;color:var(--dark-m);transition:color .2s}
.yn-b.on{border-color:rgba(14,165,201,.5);background:rgba(14,165,201,.1)}
.yn-b.on .yt{color:#fff}

/* ─── Confirm button ─── */
.ci-confirm{display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;max-width:340px;margin:24px auto 0;padding:16px;border-radius:16px;
  background:linear-gradient(135deg,var(--c-teal-d),var(--c-violet-d));
  color:#fff;font-size:14px;font-weight:700;
  box-shadow:0 6px 24px rgba(14,116,144,.35);transition:transform .2s var(--ease-s),opacity .2s}
.ci-confirm:active{transform:scale(.96)}
.ci-confirm:disabled{opacity:.3;cursor:not-allowed}

/* ── Success ── */
.ci-ok{display:none;text-align:center;padding:40px 20px}
.ci-ok.show{display:block;animation:slideUp .4s var(--ease-o)}
.ci-ok-ico{font-size:56px;margin-bottom:12px}
.ci-ok-title{font-family:var(--ffd);font-size:22px;font-weight:600;color:#fff;margin-bottom:6px}

/* ── Footer ── */
.footer{background:var(--dark-1);border-top:1px solid var(--dark-b);padding:28px 24px;text-align:center}
.footer-logo{font-family:var(--ffd);font-size:20px;font-weight:700;letter-spacing:-.07em;color:#fff;margin-bottom:6px}

/* ════════════════════════════════════════
   VIEW TOGGLE — Cards / Barres
════════════════════════════════════════ */
.ci-view-toggle{display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.06);border:1px solid var(--dark-b);border-radius:10px;padding:3px}

.ci-vt-btn.on{background:rgba(14,165,201,.18);color:var(--c-teal);border:1px solid rgba(14,165,201,.3)}
.ci-vt-btn:not(.on){border:1px solid transparent}

/* ── Bar mode container ── */
.ci-bars{display:none;padding-bottom:16px}
.ci-bars.active{display:block;animation:slideUp .3s var(--ease-o)}

.bar-row{display:flex;align-items:center;gap:10px;padding:12px 14px 12px 12px;margin-bottom:8px;
  border-radius:16px;background:rgba(255,255,255,.035);border:1px solid var(--dark-b);
  position:relative;overflow:hidden;transition:border-color .2s,background .2s}
.bar-row::before{content:'';position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.012) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.012) 1px,transparent 1px);
  background-size:16px 16px;pointer-events:none}
.bar-row.done{border-color:rgba(14,165,201,.3);background:rgba(14,165,201,.05)}
.bar-row-left{flex-shrink:0;width:56px;text-align:center}
.bar-ico{font-size:20px;line-height:1;display:block}
.bar-name{font-size:9px;font-weight:700;color:var(--dark-m);text-transform:uppercase;
  letter-spacing:.05em;margin-top:3px;line-height:1.2}
.bar-ctrl{flex:1;min-width:0;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center}
.bar-done-tag{flex-shrink:0;width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-teal),var(--c-green));
  display:none;place-items:center;font-size:10px;font-weight:800;color:#fff}
.bar-row.done .bar-done-tag{display:grid;animation:checkPop .3s var(--ease-s)}

/* Inline emoji row in bars */
.b-emo{display:flex;gap:2px}

.b-emo-o .el{font-size:8px;font-weight:700;color:transparent;transition:color .15s;display:block}
.b-emo-o.on .ef{filter:none;transform:scale(1.15)}
.b-emo-o.on .el{color:var(--dark-t)}
.b-emo-o.on{background:rgba(255,255,255,.07)}

/* Inline gauge in bars */
.b-gau{display:flex;align-items:center;gap:10px}
.b-gau-v{font-family:var(--ffd);font-size:18px;font-weight:700;color:#fff;min-width:28px;transition:color .2s}
.b-gau-l{font-size:9px;font-weight:700;min-width:44px;transition:color .2s;text-transform:uppercase;letter-spacing:.04em}
.b-gau-track{flex:1;position:relative;padding-top:4px}
.b-gau-r{width:100%;-webkit-appearance:none;appearance:none;height:6px;border-radius:99px;
  background:rgba(255,255,255,.08);outline:none;display:block}
.b-gau-r::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,var(--c-teal),var(--c-violet));
  box-shadow:0 0 10px rgba(14,165,201,.4);cursor:pointer}
.b-gau-r::-moz-range-thumb{width:24px;height:24px;border-radius:50%;border:none;
  background:linear-gradient(135deg,var(--c-teal),var(--c-violet));cursor:pointer}
.b-gau-ticks{display:flex;justify-content:space-between;padding:0 12px;margin-top:3px}
.b-gau-tick{display:flex;flex-direction:column;align-items:center;gap:2px}
.b-gau-tick-bar{width:2px;height:6px;border-radius:1px;background:rgba(255,255,255,.18)}
.b-gau-tick-lbl{font-size:7.5px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}

/* Inline stepper in bars */
.b-stp{display:flex;align-items:center;gap:8px}
.b-stp-btn{width:34px;height:34px;border-radius:10px;
  background:rgba(255,255,255,.06);border:1.5px solid var(--dark-b);
  font-size:20px;color:var(--dark-t);display:grid;place-items:center;
  transition:all .15s;flex-shrink:0}
.b-stp-btn:active{transform:scale(.88);background:rgba(14,165,201,.15);border-color:rgba(14,165,201,.4)}
.b-stp-v{font-family:var(--ffd);font-size:18px;font-weight:700;color:#fff;min-width:68px;text-align:center}
.b-stp-u{font-size:10px;font-weight:600;color:var(--dark-m)}

/* Inline color in bars */
.b-clr{display:flex;gap:5px;align-items:center}
.b-clr-o{width:32px;height:32px;border-radius:9px;border:2.5px solid transparent;
  cursor:pointer;transition:transform .2s,border-color .2s;display:grid;place-items:center;flex-shrink:0}
.b-clr-o:active{transform:scale(.88)}
.b-clr-o.on{border-color:#fff;transform:scale(1.1)}
.b-clr-o.on::after{content:'✓';font-size:13px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.b-clr-l{font-size:9px;font-weight:600;flex:1;text-align:right}
.b-clr-hint{display:flex;justify-content:space-between;font-size:9px;font-weight:600;margin-top:4px}

/* Inline quick in bars */
.b-qk{display:flex;gap:4px}
.b-qk-o{flex:1;padding:7px 3px;border-radius:10px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--dark-b);
  text-align:center;cursor:pointer;transition:all .18s var(--ease-s);min-width:0}
.b-qk-o:active{transform:scale(.92)}
.b-qk-o .qi{font-size:15px;display:block;margin-bottom:2px}
.b-qk-o .qt{font-size:8px;font-weight:700;color:var(--dark-m);transition:color .15s;line-height:1.2}
.b-qk-o.on{background:rgba(14,165,201,.1);border-color:rgba(14,165,201,.4)}
.b-qk-o.on .qt{color:#fff}

/* Inline yn in bars */
.b-yn{display:flex;gap:6px}
.b-yn-b{flex:1;padding:9px 6px;border-radius:11px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--dark-b);
  text-align:center;cursor:pointer;transition:all .2s var(--ease-s)}
.b-yn-b:active{transform:scale(.94)}
.b-yn-b .yi{font-size:16px;display:block;margin-bottom:2px}
.b-yn-b .yt{font-size:9px;font-weight:700;color:var(--dark-m);transition:color .2s;line-height:1.2}
.b-yn-b.on{border-color:rgba(14,165,201,.5);background:rgba(14,165,201,.1)}
.b-yn-b.on .yt{color:#fff}

/* Inline pills in bars */
.b-pll{display:flex;gap:5px;flex-wrap:wrap}
.b-pll-o{padding:6px 10px;border-radius:99px;
  background:rgba(255,255,255,.04);border:1.5px solid var(--dark-b);
  font-size:10px;font-weight:600;color:var(--dark-m);
  cursor:pointer;transition:all .2s;white-space:nowrap}
.b-pll-o:active{transform:scale(.92)}
.b-pll-o.on{background:rgba(14,165,201,.12);border-color:rgba(14,165,201,.4);color:#fff}

/* Save all bar */
.bars-footer{padding-top:12px;border-top:1px solid var(--dark-b);margin-top:4px}
.bars-progress{font-size:11px;font-weight:600;color:var(--dark-m);text-align:center;margin-bottom:12px}
.bars-progress span{color:var(--c-teal);font-weight:700}
</style>

<script>
/* ══════════════════════════════════════════
   Profilys — CHECK-IN ENGINE
══════════════════════════════════════════ */
var SIGS=[
  {id:'poids',icon:'⚖️',name:'Poids',type:'stepper',unit:'kg',min:30,max:200,step:0.1,dec:1,def:70},
  {id:'tour',icon:'📏',name:'Tour de taille',type:'stepper',unit:'cm',min:50,max:150,step:0.5,dec:1,def:85},
  {id:'urines',icon:'💧',name:'Hydratation',type:'color',hint:'Couleur des urines — indicateur d\'hydratation'},
  {id:'sommeil',icon:'🌙',name:'Qualité sommeil',type:'emoji5',
    faces:['😵','😕','😐','😌','😴'],labels:['Terrible','Mauvais','Moyen','Bon','Excellent']},
  {id:'stress',icon:'😰',name:'Stress',type:'gauge',min:0,max:10,def:0,
    lvl:[{m:0,l:'Zen',c:'var(--c-green)'},{m:2,l:'Calme',c:'var(--c-green)'},{m:4,l:'Léger',c:'var(--c-teal)'},
         {m:6,l:'Modéré',c:'var(--c-amber)'},{m:8,l:'Élevé',c:'var(--c-amber-d)'},{m:10,l:'Intense',c:'var(--c-red)'}],
    eL:'🧘 Zen',eR:'Intense 🔥'},
  {id:'digestion',icon:'🫃',name:'Digestion',type:'quick',
    opts:[{v:'normal',i:'✅',t:'Normal'},{v:'inconfort',i:'😬',t:'Inconfort'},{v:'ballonne',i:'🎈',t:'Ballonné'},{v:'douleurs',i:'😣',t:'Douleurs'},{v:'nausee',i:'🤢',t:'Nausée'}]},
  {id:'jeune',icon:'⏱️',name:'Jeûne',type:'yn',yTxt:'Oui, j\'ai jeûné',nTxt:'Non'},
  {id:'repas',icon:'🍽️',name:'Qualité du repas',type:'pills',hint:'Sélectionnez le type de repas',opts:[{v:'leger',t:'🥗 Léger'},{v:'normal',t:'🍽️ Normal'},{v:'riche',t:'🍖 Riche'},{v:'jeune',t:'⏱️ Jeûne'}]},
  {id:'activite',icon:'🏃',name:'Activité physique',type:'pills',hint:'Sélectionnez une ou plusieurs',
    opts:[{v:'marche',t:'🚶 Marche'},{v:'running',t:'🏃 Running'},{v:'rameur',t:'🚣 Rameur'},
          {v:'paddle',t:'🏄 Paddle'},{v:'velo',t:'🚴 Vélo'},{v:'muscu',t:'💪 Muscu'},
          {v:'yoga',t:'🧘 Yoga'},{v:'natation',t:'🏊 Natation'},{v:'tennis',t:'🎾 Tennis'},{v:'autre',t:'⚡ Autre'}]},
  {id:'humeur',icon:'😊',name:'Humeur',type:'emoji5',
    faces:['😫','😔','😐','🙂','😄'],labels:['Mal','Bof','Neutre','Bien','Top']}
];

var td={},_t={};

// Helpers
function dk(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fmtDate(){var d=new Date(),dn=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],
  mn=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return dn[d.getDay()]+' '+d.getDate()+' '+mn[d.getMonth()]}
function gH(){try{return JSON.parse(localStorage.getItem(PROFILYS.keys.checkins)||'{}')}catch(e){return{}}}
function sH(h){try{localStorage.setItem(PROFILYS.keys.checkins,JSON.stringify(h))}catch(e){}}
function loadTd(){var h=gH(),k=dk(new Date());td=(h[k]&&h[k].s)?JSON.parse(JSON.stringify(h[k].s)):{}}
function saveSig(id,v){
  td[id]=v;var h=gH(),k=dk(new Date());
  if(!h[k])h[k]={d:k,ts:new Date().toISOString(),s:{}};
  h[k].s[id]=v;h[k].ts=new Date().toISOString();sH(h);
  if(_viewMode==='cards')renderMenu();
  updNav()
}
function streak(){var h=gH(),s=0,d=new Date();if(!h[dk(d)])return 0;s=1;
  for(var i=1;i<365;i++){d.setDate(d.getDate()-1);if(h[dk(d)])s++;else break}return s}
function getLvl(lvls,v){for(var i=0;i<lvls.length;i++){if(v<=lvls[i].m)return lvls[i]}return lvls[lvls.length-1]}

// Open / Close
function openCI(){loadTd();renderMenu();renderWeek();
  document.getElementById('ciOv').classList.add('open');
  document.getElementById('ciPan').classList.add('open');
  document.body.style.overflow='hidden';
  if(_viewMode==='bars'){renderBars();showV('bars')}else{showV('menu')}}
function closeCI(){
  document.getElementById('ciOv').classList.remove('open');
  document.getElementById('ciPan').classList.remove('open');
  document.body.style.overflow='';
  // If inside iframe in app.html, close via parent
  try{if(window.parent&&window.parent!==window)window.parent.closeCI()}catch(e){}
}
var _viewMode=(function(){try{return localStorage.getItem('profilys_view_mode')||'cards'}catch(e){return 'cards'}})();

function setView(m){
  _viewMode=m;
  try{localStorage.setItem('profilys_view_mode',m)}catch(e){}
  document.getElementById('vtCards').className='ci-vt-btn'+(m==='cards'?' on':'');
  document.getElementById('vtBars').className='ci-vt-btn'+(m==='bars'?' on':'');
  if(m==='bars'){renderBars();showV('bars')}
  else{showV('menu')}
}

function showV(v){
  document.getElementById('vBars').className='ci-bars'+(v==='bars'?' active':'');
  document.getElementById('vMenu').style.display=(v==='menu')?'block':'none';
  document.getElementById('vInput').className='ci-input'+(v==='input'?' active':'');
  document.getElementById('vOk').className='ci-ok'+(v==='ok'?' show':'')}
function toMenu(){showV(_viewMode==='bars'?'bars':'menu')}

// Menu
function renderMenu(){var g=document.getElementById('mGrid');g.innerHTML='';
  SIGS.forEach(function(s){var d=document.createElement('div');
    d.className='ci-mi'+(td[s.id]!==undefined?' done':'');
    d.onclick=function(){openSig(s.id)};
    d.innerHTML='<span class="mi-ico">'+s.icon+'</span><span class="mi-name">'+s.name+'</span>';
    g.appendChild(d)})}

// Week
function renderWeek(){var c=document.getElementById('wStrip');c.innerHTML='';
  var t=new Date(),dow=t.getDay(),mon=new Date(t);mon.setDate(t.getDate()-((dow+6)%7));
  var ns=['L','M','M','J','V','S','D'],h=gH();
  for(var i=0;i<7;i++){var d=new Date(mon);d.setDate(mon.getDate()+i);
    var k=dk(d),isT=dk(t)===k,dn=!!h[k];
    var e=document.createElement('div');
    e.className='ci-wd'+(dn?' done':'')+(isT?' today':'');
    e.innerHTML='<div class="ci-wd-n">'+ns[i]+'</div><div class="ci-wd-d">'+d.getDate()+'</div><div class="ci-wd-dot"></div>';
    c.appendChild(e)}}

// Nav
function updNav(){var h=gH(),k=dk(new Date()),b=document.getElementById('navCI');
  if(h[k]&&h[k].s&&Object.keys(h[k].s).length>0){b.classList.add('done');b.innerHTML='<span class="nc-dot"></span> Check-in ✓'}}

// ══ Signal Input ══
function openSig(id){
  var s=SIGS.find(function(x){return x.id===id});if(!s)return;
  var c=document.getElementById('iContent'),cv=td[s.id],h='';
  _t={};

  h+='<div class="ci-sig-head"><span class="ci-sig-ico">'+s.icon+'</span>';
  h+='<div class="ci-sig-title">'+s.name+'</div>';
  if(s.hint)h+='<div class="ci-sig-hint">'+s.hint+'</div>';
  h+='</div>';

  switch(s.type){
    case 'emoji5':
      h+='<div class="emo-row">';
      for(var i=0;i<5;i++){var sel=cv===(i+1)?' on':'';
        h+='<div class="emo-opt'+sel+'" data-v="'+(i+1)+'" onclick="pEmo(this,\''+id+'\')"><span class="ef">'+s.faces[i]+'</span><span class="el">'+s.labels[i]+'</span></div>'}
      h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="cfmEmo(\''+id+'\')" '+(cv?'':'disabled')+'>Valider →</button>';
      break;

    case 'gauge':
      var gv=cv!==undefined?cv:s.def,gi=getLvl(s.lvl,gv);
      h+='<div class="gau"><div class="gau-v" id="gV" style="color:'+gi.c+'">'+gv+'</div>';
      h+='<div class="gau-l" id="gL" style="color:'+gi.c+'">'+gi.l+'</div>';
      h+='<input type="range" class="gau-r" id="gR" min="'+s.min+'" max="'+s.max+'" value="'+gv+'" step="1" oninput="uGau(this.value,\''+id+'\')">';
      h+='<div class="gau-ends"><span class="gau-end">'+s.eL+'</span><span class="gau-end">'+s.eR+'</span></div></div>';
      h+='<button class="ci-confirm" onclick="cfmGau(\''+id+'\')">Valider →</button>';
      break;

    case 'stepper':
      var sv=cv!==undefined?cv:s.def;_t._sv=sv;
      h+='<div class="stp"><button class="stp-btn" onclick="stp(\''+id+'\',-1)">−</button>';
      h+='<div><div class="stp-v" id="stV">'+sv.toFixed(s.dec)+'</div><div class="stp-u">'+s.unit+'</div></div>';
      h+='<button class="stp-btn" onclick="stp(\''+id+'\',1)">+</button></div>';
      h+='<button class="ci-confirm" onclick="cfmStp(\''+id+'\')">Valider →</button>';
      break;

    case 'color':
      var cls=[{bg:'#f5f0d0',l:'Transparent'},{bg:'#f0e68c',l:'Jaune clair'},{bg:'#daa520',l:'Jaune'},
               {bg:'#cd853f',l:'Jaune foncé'},{bg:'#a0522d',l:'Ambre'},{bg:'#8b4513',l:'Brun'}];
      h+='<div class="clr-strip">';
      for(var j=0;j<cls.length;j++){var cs=cv===(j+1)?' on':'';
        h+='<div class="clr-opt'+cs+'" style="background:'+cls[j].bg+'" data-v="'+(j+1)+'" onclick="pClr(this,\''+id+'\')" title="'+cls[j].l+'"></div>'}
      h+='</div><div style="display:flex;justify-content:space-between;padding:6px 4px 0"><span style="font-size:10px;font-weight:600;color:var(--c-green)">Bien hydraté</span><span style="font-size:10px;font-weight:600;color:var(--c-amber)">Déshydraté</span></div>';
      h+='<button class="ci-confirm" id="cfm" onclick="cfmClr(\''+id+'\')" '+(cv?'':'disabled')+'>Valider →</button>';
      break;

    case 'quick':
      h+='<div class="qk-row">';
      s.opts.forEach(function(o){var qs=cv===o.v?' on':'';
        h+='<div class="qk-opt'+qs+'" data-v="'+o.v+'" onclick="pQk(this,\''+id+'\')"><span class="qi">'+o.i+'</span><span class="qt">'+o.t+'</span></div>'});
      h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="cfmQk(\''+id+'\')" '+(cv?'':'disabled')+'>Valider →</button>';
      break;

    case 'yn':
      h+='<div class="yn">';
      h+='<div class="yn-b'+(cv===true?' on':'')+'" data-v="true" onclick="pYn(this,\''+id+'\')"><span class="yi">✅</span><span class="yt">'+s.yTxt+'</span></div>';
      h+='<div class="yn-b'+(cv===false?' on':'')+'" data-v="false" onclick="pYn(this,\''+id+'\')"><span class="yi">❌</span><span class="yt">'+s.nTxt+'</span></div>';
      h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="cfmYn(\''+id+'\')" '+(cv!==undefined?'':'disabled')+'>Valider →</button>';
      break;

    case 'pills':
      var ca=Array.isArray(cv)?cv:[];
      h+='<div class="pll-row">';
      s.opts.forEach(function(o){var ps=ca.indexOf(o.v)>-1?' on':'';
        h+='<div class="pll'+ps+'" data-v="'+o.v+'" onclick="pPll(this)">'+o.t+'</div>'});
      h+='</div>';
      h+='<button class="ci-confirm" id="cfm" onclick="cfmPll(\''+id+'\')" '+(ca.length?'':'disabled')+'>Valider →</button>';
      break;
  }
  c.innerHTML=h;showV('input');document.getElementById('ciBd').scrollTop=0}

// Interactions
function vib(){if(navigator.vibrate)navigator.vibrate(12)}
function enCfm(){var b=document.getElementById('cfm');if(b)b.disabled=false}

function pEmo(el,id){el.parentElement.querySelectorAll('.emo-opt').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');_t[id]=parseInt(el.dataset.v);enCfm();vib()}
function cfmEmo(id){if(_t[id]){saveSig(id,_t[id]);showOk(id)}}

function uGau(v,id){v=parseInt(v);var s=SIGS.find(function(x){return x.id===id}),i=getLvl(s.lvl,v);
  document.getElementById('gV').textContent=v;document.getElementById('gV').style.color=i.c;
  document.getElementById('gL').textContent=i.l;document.getElementById('gL').style.color=i.c;_t[id]=v}
function cfmGau(id){var v=parseInt(document.getElementById('gR').value);saveSig(id,v);showOk(id)}

function stp(id,dir){var s=SIGS.find(function(x){return x.id===id});
  var cur=_t._sv!==undefined?_t._sv:(td[id]!==undefined?td[id]:s.def);
  cur+=dir*s.step;cur=Math.max(s.min,Math.min(s.max,cur));cur=Math.round(cur*100)/100;
  _t._sv=cur;document.getElementById('stV').textContent=cur.toFixed(s.dec);vib()}
function cfmStp(id){var s=SIGS.find(function(x){return x.id===id});
  var v=_t._sv!==undefined?_t._sv:(td[id]!==undefined?td[id]:s.def);saveSig(id,v);showOk(id)}

function pClr(el,id){el.parentElement.querySelectorAll('.clr-opt').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');_t[id]=parseInt(el.dataset.v);enCfm();vib()}
function cfmClr(id){if(_t[id]){saveSig(id,_t[id]);showOk(id)}}

function pQk(el,id){el.parentElement.querySelectorAll('.qk-opt').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');_t[id]=el.dataset.v;enCfm();vib()}
function cfmQk(id){if(_t[id]){saveSig(id,_t[id]);showOk(id)}}

function pYn(el,id){el.parentElement.querySelectorAll('.yn-b').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');_t[id]=el.dataset.v==='true';enCfm();vib()}
function cfmYn(id){if(_t[id]!==undefined){saveSig(id,_t[id]);showOk(id)}}

function pPll(el){el.classList.toggle('on');
  var sel=[];el.parentElement.querySelectorAll('.pll.on').forEach(function(p){sel.push(p.dataset.v)});
  var b=document.getElementById('cfm');if(b)b.disabled=sel.length===0;_t._pl=sel;vib()}
function cfmPll(id){var s=_t._pl||[];if(s.length>0){saveSig(id,s);showOk(id)}}

function showOk(id){var s=SIGS.find(function(x){return x.id===id});
  document.getElementById('okMsg').textContent=s.icon+' '+s.name+' enregistré';
  var st=streak();document.getElementById('okStreak').textContent='🔥 '+st+' jour'+(st>1?'s':'')+' consécutif'+(st>1?'s':'');
  showV('ok');if(navigator.vibrate)navigator.vibrate([15,40,15]);renderWeek()}


// ══ BAR MODE — Express view ══
function renderBars(){
  loadTd();
  var c=document.getElementById('vBars');
  var done=Object.keys(td).length;
  var h='<div class="bars-progress"><span>'+done+'</span> / '+SIGS.length+' signaux renseignés</div>';
  SIGS.forEach(function(s){
    var cv=td[s.id];
    var isDone=cv!==undefined&&cv!==null&&!(Array.isArray(cv)&&cv.length===0);
    h+='<div class="bar-row'+(isDone?' done':'')+'" id="br-'+s.id+'">';
    h+='<div class="bar-row-left"><span class="bar-ico">'+s.icon+'</span><div class="bar-name">'+s.name+'</div></div>';
    h+='<div class="bar-ctrl">'+barCtrl(s,cv)+'</div>';
    h+='<div class="bar-done-tag">✓</div>';
    h+='</div>';
  });
  c.innerHTML=h;
}

function barCtrl(s,cv){
  var h='';
  switch(s.type){
    case 'emoji5':
      h='<div class="b-emo">';
      for(var i=0;i<5;i++){var sel=cv===(i+1)?' on':'';
        h+='<div class="b-emo-o'+sel+'" data-v="'+(i+1)+'" onclick="bEmo(this,\''+s.id+'\')"><span class="ef">'+s.faces[i]+'</span><span class="el">'+s.labels[i]+'</span></div>';}
      h+='</div>';break;

    case 'gauge':
      var gv=cv!==undefined?cv:s.def,gi=getLvl(s.lvl,gv);
      h='<div class="b-gau">';
      h+='<div class="b-gau-v" id="bgV-'+s.id+'" style="color:'+gi.c+'">'+gv+'</div>';
      h+='<div class="b-gau-track">';
      h+='<input type="range" class="b-gau-r" id="bgR-'+s.id+'" min="'+s.min+'" max="'+s.max+'" value="'+gv+'" step="1" oninput="bGau(this,\''+s.id+'\')">'; 
      // Build ticks from lvl thresholds
      h+='<div class="b-gau-ticks">';
      var tickColors=['var(--c-green)','var(--c-green)','var(--c-teal)','var(--c-amber)','var(--c-amber-d)','var(--c-red)'];
      for(var ti=0;ti<s.lvl.length;ti++){var tl=s.lvl[ti];
        h+='<div class="b-gau-tick"><div class="b-gau-tick-bar" style="background:'+tickColors[ti]+'"></div><div class="b-gau-tick-lbl" style="color:'+tickColors[ti]+'">'+tl.l+'</div></div>';}
      h+='</div></div>';
      h+='<div class="b-gau-l" id="bgL-'+s.id+'" style="color:'+gi.c+'">'+gi.l+'</div>';
      h+='</div>';break;

    case 'stepper':
      var sv=cv!==undefined?cv:s.def;
      h='<div class="b-stp">';
      h+='<button class="b-stp-btn" onclick="bStp(\''+s.id+'\', -1)">−</button>';
      h+='<div><div class="b-stp-v" id="bstV-'+s.id+'">'+sv.toFixed(s.dec)+'</div><div class="b-stp-u">'+s.unit+'</div></div>';
      h+='<button class="b-stp-btn" onclick="bStp(\''+s.id+'\',1)">+</button>';
      h+='</div>';break;

    case 'color':
      var cls=[{bg:'#f5f0d0',l:'Transparent'},{bg:'#f0e68c',l:'Jaune clair'},{bg:'#daa520',l:'Jaune'},
               {bg:'#cd853f',l:'Jaune foncé'},{bg:'#a0522d',l:'Ambre'},{bg:'#8b4513',l:'Brun'}];
      h='<div>';
      h+='<div class="b-clr">';
      for(var j=0;j<cls.length;j++){var cs=cv===(j+1)?' on':'';
        h+='<div class="b-clr-o'+cs+'" style="background:'+cls[j].bg+'" data-v="'+(j+1)+'" onclick="bClr(this,\''+s.id+'\')"></div>';}
      h+='</div>';
      h+='<div class="b-clr-hint"><span style="color:var(--c-green)">💧 Hydraté</span><span style="color:var(--c-amber)">⚠️ Déshydraté</span></div>';
      h+='</div>';break;

    case 'quick':
      h='<div class="b-qk">';
      s.opts.forEach(function(o){var qs=cv===o.v?' on':'';
        h+='<div class="b-qk-o'+qs+'" data-v="'+o.v+'" onclick="bQk(this,\''+s.id+'\')"><span class="qi">'+o.i+'</span><span class="qt">'+o.t+'</span></div>';});
      h+='</div>';break;

    case 'yn':
      h='<div class="b-yn">';
      h+='<div class="b-yn-b'+(cv===true?' on':'')+'" data-v="true" onclick="bYn(this,\''+s.id+'\')"><span class="yi">✅</span><span class="yt">'+s.yTxt+'</span></div>';
      h+='<div class="b-yn-b'+(cv===false?' on':'')+'" data-v="false" onclick="bYn(this,\''+s.id+'\')"><span class="yi">❌</span><span class="yt">'+s.nTxt+'</span></div>';
      h+='</div>';break;

    case 'pills':
      var ca=Array.isArray(cv)?cv:[];
      h='<div class="b-pll">';
      s.opts.forEach(function(o){var ps=ca.indexOf(o.v)>-1?' on':'';
        h+='<div class="b-pll-o'+ps+'" data-v="'+o.v+'" onclick="bPll(this,\''+s.id+'\')">'+o.t+'</div>';});
      h+='</div>';break;
  }
  return h;
}

// Bar interactions — auto-save on each change
function bRowDone(id){
  var r=document.getElementById('br-'+id);if(r){r.classList.add('done');}
  var done=Object.keys(td).length;
  var prog=document.querySelector('.bars-progress');
  if(prog)prog.innerHTML='<span>'+done+'</span> / '+SIGS.length+' signaux renseignés';
  if(navigator.vibrate)navigator.vibrate(12);
}

function bEmo(el,id){
  el.parentElement.querySelectorAll('.b-emo-o').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');saveSig(id,parseInt(el.dataset.v));bRowDone(id);}

function bGau(inp,id){
  var v=parseInt(inp.value);var s=SIGS.find(function(x){return x.id===id;});var gi=getLvl(s.lvl,v);
  var vEl=document.getElementById('bgV-'+id);var lEl=document.getElementById('bgL-'+id);
  if(vEl){vEl.textContent=v;vEl.style.color=gi.c;}
  if(lEl){lEl.textContent=gi.l;lEl.style.color=gi.c;}
  saveSig(id,v);bRowDone(id);}

function bStp(id,dir){
  var s=SIGS.find(function(x){return x.id===id;});
  var el=document.getElementById('bstV-'+id);
  var cur=parseFloat(el.textContent)||s.def;
  cur+=dir*s.step;cur=Math.max(s.min,Math.min(s.max,cur));cur=Math.round(cur*100)/100;
  el.textContent=cur.toFixed(s.dec);
  saveSig(id,cur);bRowDone(id);}

function bClr(el,id){
  el.parentElement.querySelectorAll('.b-clr-o').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');saveSig(id,parseInt(el.dataset.v));bRowDone(id);}

function bQk(el,id){
  el.parentElement.querySelectorAll('.b-qk-o').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');saveSig(id,el.dataset.v);bRowDone(id);}

function bYn(el,id){
  el.parentElement.querySelectorAll('.b-yn-b').forEach(function(o){o.classList.remove('on')});
  el.classList.add('on');saveSig(id,el.dataset.v==='true');bRowDone(id);}

function bPll(el,id){
  el.classList.toggle('on');
  var sel=[];el.parentElement.querySelectorAll('.b-pll-o.on').forEach(function(p){sel.push(p.dataset.v);});
  if(sel.length>0){saveSig(id,sel);bRowDone(id);}
  else{delete td[id];var h=gH(),k=dk(new Date());if(h[k]&&h[k].s)delete h[k].s[id];sH(h);}
  var done=Object.keys(td).length;
  var prog=document.querySelector('.bars-progress');
  if(prog)prog.innerHTML='<span>'+done+'</span> / '+SIGS.length+' signaux renseignés';}

// Init
function init(){
  document.getElementById('ciDt').textContent=fmtDate();loadTd();updNav();
  // Restore saved view mode
  document.getElementById('vtCards').className='ci-vt-btn'+(_viewMode==='cards'?' on':'');
  document.getElementById('vtBars').className='ci-vt-btn'+(_viewMode==='bars'?' on':'');
  try{var ss=JSON.parse(localStorage.getItem(PROFILYS.keys.session)||'{}');
    if(ss&&ss.name){document.getElementById('navNm').textContent=ss.name;
      document.getElementById('navAv').textContent=ss.name.charAt(0).toUpperCase()}}catch(e){}}
init();
</script>
